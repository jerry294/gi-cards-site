<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 加入網頁標籤小圖示 -->
<link rel="icon" type="image/png" href="favicon.png">
<title>G.I. 貪婪之島 卡片交換系統</title>
<style>
:root {
  --bg: #0d0d1a;
  --bg2: #1a1a2e;
  --bg3: #16213e;
  --gold: #c9a84c;
  --gold-light: #f0c060;
  --green: #27ae60;
  --green-light: #2ecc71;
  --orange: #e67e22;
  --red: #e74c3c;
  --text: #e8e8f0;
  --text-dim: #7a7a9a;
  --border: #2a2a4a;
  --card-w: 128px;
  --card-img-h: 128px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Microsoft JhengHei', 'Noto Sans TC', 'PingFang TC', sans-serif;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #0a0a18 0%, #1a1a2e 100%);
  border-bottom: 2px solid var(--gold);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 58px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 24px rgba(201,168,76,0.25);
}
.logo {
  font-size: 18px;
  font-weight: bold;
  color: var(--gold);
  text-shadow: 0 0 12px rgba(201,168,76,0.6);
  white-space: nowrap;
  letter-spacing: 1px;
}
.nav { display: flex; gap: 4px; flex: 1; }
.nav-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-btn:hover { color: var(--text); border-color: var(--border); }
.nav-btn.active { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold); }
.user-chip {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; padding: 4px 10px 4px 4px;
  border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg2); transition: border-color 0.2s;
}
.user-chip:hover { border-color: var(--gold); }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 13px; color: #000; flex-shrink: 0;
}
.user-name-chip { font-size: 13px; color: var(--text-dim); }

/* MAIN */
.main { padding: 18px 20px; }

/* FILTER BAR */
.filter-bar {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 14px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-bar input[type="text"] {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 12px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  width: 190px;
  transition: border-color 0.2s;
}
.filter-bar input[type="text"]:focus { border-color: var(--gold); }
.filter-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 11px;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-btn:hover { color: var(--text); border-color: #444466; }
.filter-btn.active { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold); }
.filter-btn.have-active { background: rgba(39,174,96,0.12); border-color: var(--green); color: var(--green-light); }
.filter-btn.want-active { background: rgba(231,76,60,0.12); border-color: var(--red); color: #ff7070; }
.filter-select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  outline: none;
}

/* SORT GROUP TOGGLE */
.sort-group {
  display: flex; gap: 4px; padding-right: 12px; margin-right: 4px; border-right: 1px solid var(--border);
}

/* STATS */
.stats-bar {
  display: flex; gap: 14px; margin-bottom: 14px;
  font-size: 12px; color: var(--text-dim);
  align-items: center; flex-wrap: wrap;
}
.stat-item { display: flex; align-items: center; gap: 5px; }
.stat-dot { width: 7px; height: 7px; border-radius: 50%; }

/* SECTION GROUP */
.section-group { margin-bottom: 18px; }
.section-group-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; cursor: pointer; user-select: none;
  padding: 6px 4px;
  border-bottom: 1px solid var(--border);
}
.section-group-header h3 { font-size: 13px; font-weight: 600; }
.section-group-header .cnt { font-size: 11px; color: var(--text-dim); opacity: 0.8; }
.section-group-header .tog { margin-left: auto; color: var(--text-dim); font-size: 11px; }
.rg-SS h3 { color: #d4a017; }
.rg-S h3  { color: #9b59b6; }
.rg-A h3  { color: #3498db; }
.rg-B h3  { color: #27ae60; }
.rg-C h3  { color: #aaa; }
.rg-D h3  { color: #888; }
.rg-DP h3 { color: #3498db; }
.rg-FP h3 { color: #a060e0; }
.rg-dsh h3 { color: #666; }

/* 劇情卡 filter active button */
.filter-btn.story-active { background: rgba(201,168,76,0.18); border-color: var(--gold); color: var(--gold-light); }

/* CARD GRID */
.card-grid { display: flex; flex-wrap: wrap; gap: 10px; }

/* CARD ITEM */
.card-item {
  width: var(--card-w);
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.18s, box-shadow 0.18s, transform 0.15s;
  cursor: default;
  position: relative;
  flex-shrink: 0;
}
.card-item:hover { border-color: #3a3a5a; transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.5); }
.card-item.have { border-color: var(--green); box-shadow: 0 0 12px rgba(39,174,96,0.3); }
.card-item.want { border-color: var(--red); box-shadow: 0 0 12px rgba(231,76,60,0.3); }
.card-item.have.want { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.35); }

.card-img-wrap {
  width: 100%; height: var(--card-img-h);
  position: relative; overflow: hidden; background: #060610;
}
.card-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.card-no-img {
  width: 100%; height: 100%;
  display: none; align-items: center; justify-content: center;
  font-size: 32px; color: var(--text-dim);
}
.card-rarity-badge {
  position: absolute; top: 4px; right: 4px;
  padding: 2px 6px; border-radius: 3px;
  font-size: 10px; font-weight: bold; letter-spacing: 0.5px;
}
.rarity-SS  { background: #8b6914; color: #ffd970; }
.rarity-S   { background: #5a0c8c; color: #e0b8ff; }
.rarity-A   { background: #1a4a7a; color: #90ccff; }
.rarity-B   { background: #1a4a1a; color: #90e090; }
.rarity-C   { background: #3a3a3a; color: #ccc; }
.rarity-D   { background: #2a2a2a; color: #999; }
.rarity-dsh { background: #1a1a1a; color: #555; }

/* 自由口袋 sub-type badges */
.sub-badge {
  position: absolute; top: 24px; right: 4px;
  padding: 1px 5px; border-radius: 3px;
  font-size: 9px; font-weight: bold; letter-spacing: 0.3px;
}
.sub-spell   { background: #3a0070; color: #d8b4ff; }
.sub-village { background: #4a2a00; color: #ffc870; }

/* 劇情卡 corner ribbon */
.story-corner {
  position: absolute; top: 0; left: 0;
  width: 0; height: 0;
  border-top: 22px solid rgba(201,168,76,0.85);
  border-right: 22px solid transparent;
}
.story-corner::after {
  content: '📖'; position: absolute;
  top: -20px; left: 0;
  font-size: 10px; line-height: 1;
}

.card-status-badges {
  position: absolute; top: 4px; left: 4px;
  display: flex; flex-direction: column; gap: 2px;
}
.status-badge {
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: bold;
}
.have-badge { background: var(--green); color: #fff; }
.want-badge { background: var(--red); color: #fff; }

.card-info { padding: 5px 7px 7px; }
.card-num { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
.card-name {
  font-size: 11px; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  line-height: 1.3; margin-bottom: 5px;
}
.card-actions { display: flex; gap: 4px; }
.action-btn {
  flex: 1; padding: 4px 0;
  border-radius: 4px; border: 1px solid;
  font-size: 10px; cursor: pointer;
  transition: all 0.15s; font-weight: 500;
  text-align: center;
}
.have-btn { background: transparent; border-color: #294229; color: #4a7a4a; }
.have-btn.active { background: var(--green); border-color: var(--green); color: #fff; }
.have-btn:hover { background: rgba(39,174,96,0.18); border-color: var(--green-light); color: var(--green-light); }
.want-btn { background: transparent; border-color: #52202a; color: #8a4a4a; }
.want-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
.want-btn:hover { background: rgba(231,76,60,0.18); border-color: #ff7070; color: #ff7070; }

/* BOARD & MATCH */
.board-container { max-width: 860px; }
.share-section {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; margin-bottom: 18px;
}
.share-section h3 { font-size: 13px; color: var(--gold); margin-bottom: 10px; }
.share-code-display {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 9px 12px;
  font-family: monospace; font-size: 11px; color: var(--text-dim);
  word-break: break-all; max-height: 56px; overflow-y: auto; margin-bottom: 8px;
}
.board-toolbar {
  display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap;
}
.code-input {
  flex: 1; min-width: 200px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px;
  color: var(--text); font-size: 13px; outline: none; font-family: monospace;
}
.code-input:focus { border-color: var(--gold); }
.btn-secondary {
  background: var(--bg2); border: 1px solid var(--gold);
  border-radius: 8px; padding: 8px 14px;
  color: var(--gold); font-size: 13px; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.btn-secondary:hover { background: rgba(201,168,76,0.12); }

.user-list { display: flex; flex-direction: column; gap: 10px; }
.user-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 15px;
  display: flex; align-items: center; gap: 13px;
  cursor: pointer; transition: all 0.2s;
}
.user-card:hover { border-color: #3a3a5a; box-shadow: 0 3px 12px rgba(0,0,0,0.35); }
.user-card.match-perfect { border-color: var(--gold); background: rgba(201,168,76,0.05); }
.user-card.match-good { border-color: var(--green); background: rgba(39,174,96,0.04); }
.user-avatar-lg {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 17px; color: #000; flex-shrink: 0;
}
.user-details { flex: 1; }
.user-name { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
.user-stats { display: flex; gap: 12px; font-size: 12px; color: var(--text-dim); flex-wrap: wrap; }
.match-score { text-align: right; flex-shrink: 0; }
.match-label { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
.match-value { font-size: 18px; font-weight: bold; color: var(--text-dim); }
.match-perfect .match-value { color: var(--gold); }
.match-good .match-value { color: var(--green-light); }

.match-card {
  background: var(--bg2); border: 1px solid var(--gold);
  border-radius: 10px; padding: 15px; margin-bottom: 12px;
}
.tag-chip {
  display: inline-block; font-size: 11px;
  padding: 3px 7px; border-radius: 4px; margin: 2px;
}
.tag-have { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.4); color: var(--green-light); }
.tag-want { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #ff7a7a; }
.tag-normal { background: var(--bg3); border: 1px solid var(--border); color: var(--text); }

/* CHAT VIEW */
.chat-container { display: flex; gap: 20px; max-width: 1000px; height: calc(100vh - 120px); margin: 0 auto; flex-wrap: wrap; }
.chat-sidebar { width: 300px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.chat-main { flex: 1; min-width: 300px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
.chat-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); }
.chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
.chat-msg.mine { align-self: flex-end; background: var(--gold); color: #000; border-bottom-right-radius: 4px; }
.chat-msg.theirs { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
.chat-input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: rgba(0,0,0,0.2); }
.chat-input-area input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 10px 15px; color: var(--text); outline: none; }
.chat-input-area input:focus { border-color: var(--gold); }
.chat-input-area button { background: var(--gold); color: #000; border: none; border-radius: 20px; padding: 0 20px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
.chat-input-area button:hover { opacity: 0.9; }
.trade-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 15px; }
.trade-box h4 { font-size: 12px; color: var(--gold); margin-bottom: 8px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.82);
  z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 22px 24px;
  max-width: 680px; width: 100%; max-height: 85vh; overflow-y: auto;
}
.modal-header {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 16px;
}
.modal-close { background: transparent; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 4px; }
.modal-close:hover { color: var(--text); }

/* FORM & UI */
.btn-primary {
  width: 100%; background: linear-gradient(135deg, var(--gold), #9a6c1a);
  border: none; border-radius: 8px; padding: 11px;
  color: #000; font-size: 15px; font-weight: bold; cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-primary:hover { opacity: 0.92; }
.btn-primary:active { transform: scale(0.98); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 7px; color: var(--gold); font-size: 13px; }
.form-group input {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 9px 13px; color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--gold); }

.empty-state { text-align: center; padding: 50px 20px; color: var(--text-dim); }
.empty-state .icon { font-size: 44px; margin-bottom: 14px; }
.empty-state h3 { margin-bottom: 8px; font-size: 15px; }
.empty-state p { font-size: 13px; }

.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--bg2); border: 1px solid var(--gold);
  border-radius: 8px; padding: 11px 16px; color: var(--text); font-size: 13px;
  z-index: 300; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  animation: slideIn 0.28s ease;
}
@keyframes slideIn { from { transform: translateX(80px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

@media (max-width: 600px) {
  :root { --card-w: 108px; --card-img-h: 108px; }
  .header { height: 50px; gap: 12px; }
  .logo { font-size: 15px; }
  .filter-bar input[type="text"] { width: 140px; }
  .main { padding: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚔️ G.I. 卡片交換</div>
  <nav class="nav">
    <button class="nav-btn active" id="nav-cards" onclick="switchView('cards')">🃏 卡片設定</button>
    <button class="nav-btn" id="nav-board" onclick="switchView('board')">📋 交換看板</button>
    <button class="nav-btn" id="nav-match" onclick="switchView('match')">🔥 配對搜尋</button>
  </nav>
  <div class="user-chip" onclick="openProfileModal()">
    <div class="user-avatar" id="headerAvatar">?</div>
    <span class="user-name-chip" id="headerName">設定暱稱</span>
  </div>
</div>

<div class="main" id="mainContent"></div>

<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="onOverlayClick(event)">
  <div class="modal" id="modalContent"></div>
</div>

// 取得卡片分類群組 (支援切換模式)
function cardGroup(c, mode) {
  if (mode === 'id') {
    // 依編號排列模式：區分指定口袋(0-99)與自由口袋
    return (c.id >= 0 && c.id <= 99) ? 'DP' : 'FP';
  } else {
    // 依難度排列模式：原本的邏輯
    return FREE_POCKET_IDS.has(c.id) ? 'FP' : c.rarity;
  }
}

function getSortValue(id) {
  if (id === -3) return 100; // 讓 -003 排在 99 和 163 之間 (自由口袋的第一張)
  return id;
}

// ==================== CARD HELPERS ====================
function fmtId(id) {
  if (id < 0)     return `#${id}`;
  if (id >= 1000) return `#${id}`;
  return `#${String(id).padStart(3,'0')}`;
}
function cardLabel(id) {
  const c = CARDS.find(c => c.id === id);
  if (!c) return `#${id}`;
  return `${fmtId(id)} ${c.name}`;
}
function rarityClass(r) {
  if (r === 'F' || r === 'G' || r === '-') return 'rarity-dsh';
  return `rarity-${r}`;
}

function cardHTML(card) {
  const h = S.have.has(card.id), w = S.want.has(card.id);
  let cls = 'card-item';
  if (h) cls += ' have';
  if (w) cls += ' want';
  const subBadge = SPELL_IDS.has(card.id)   ? '<div class="sub-badge sub-spell">咒語</div>' :
                   VILLAGE_IDS.has(card.id) ? '<div class="sub-badge sub-village">村民</div>' : '';
  const storyCorner = STORY_IDS.has(card.id) ? '<div class="story-corner"></div>' : '';
  const rarityLabel = card.rarity === '-' ? '─' : card.rarity;
  
  return `<div class="${cls}" data-id="${card.id}">
    <div class="card-img-wrap">
      <img src="cards/${card.img}" alt="${card.name}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-no-img">🃏</div>
      <div class="card-rarity-badge ${rarityClass(card.rarity)}">${rarityLabel}</div>
      ${subBadge}
      ${storyCorner}
      <div class="card-status-badges">
        ${h ? '<div class="status-badge have-badge">有</div>' : ''}
        ${w ? '<div class="status-badge want-badge">要</div>' : ''}
      </div>
    </div>
    <div class="card-info">
      <div class="card-num">${fmtId(card.id)}</div>
      <div class="card-name" title="${card.name}">${card.name}</div>
      <div class="card-actions">
        <button class="action-btn have-btn ${h?'active':''}" onclick="toggleHave(${card.id},event)">✓ 我有</button>
        <button class="action-btn want-btn ${w?'active':''}" onclick="toggleWant(${card.id},event)">♥ 我要</button>
      </div>
    </div>
  </div>`;
}

// ==================== VIEWS ====================
function filteredCards() {
  const q = S.filter.search.toLowerCase();
  // 💡 更新：排序時套用專屬的 getSortValue 規則
  const sorted = [...CARDS].sort((a,b) => getSortValue(a.id) - getSortValue(b.id));
  return sorted.filter(c => {
    if (q && !c.name.toLowerCase().includes(q) && !c.nameJP.toLowerCase().includes(q) && !String(c.id).includes(q)) return false;
    if (S.filter.rarity !== 'all' && cardGroup(c, 'rarity') !== S.filter.rarity) return false;
    if (S.filter.status === 'have'    && !S.have.has(c.id)) return false;
    if (S.filter.status === 'want'    && !S.want.has(c.id)) return false;
    if (S.filter.status === 'neither' && (S.have.has(c.id) || S.want.has(c.id))) return false;
    if (S.filter.story && !STORY_IDS.has(c.id)) return false;
    return true;
  });
}

function renderCards() {
  const list = filteredCards();
  const groups = {};
  list.forEach(c => {
    const g = cardGroup(c, S.filter.sortMode);
    if (!groups[g]) groups[g] = [];
    groups[g].push(c);
  });

  // 💡 根據目前選擇的排列模式切換標籤與順序
  const currentOrder = S.filter.sortMode === 'id' ? ['DP', 'FP'] : ['SS','S','A','B','C','D','FP'];
  const currentLabels = S.filter.sortMode === 'id' ? GROUP_LABELS_ID : GROUP_LABELS_RARITY;

  let html = '';
  currentOrder.forEach(g => {
    if (!groups[g] || groups[g].length === 0) return;
    const col = S.collapsed[g];
    const label = currentLabels[g] || g;
    const rgCls = `rg-${g}`;
    let gridHtml = '';
    
    // 處理自由口袋內的子分類
    if (g === 'FP' && !col) {
      const spells  = groups[g].filter(c => SPELL_IDS.has(c.id));
      const village = groups[g].filter(c => VILLAGE_IDS.has(c.id));
      const other   = groups[g].filter(c => !SPELL_IDS.has(c.id) && !VILLAGE_IDS.has(c.id));
      if (spells.length) gridHtml += `
        <div style="font-size:11px;color:#a060e0;margin-bottom:6px;margin-top:4px;font-weight:600;letter-spacing:0.5px">⚡ 咒語（${spells.length}）</div>
        <div class="card-grid" style="margin-bottom:14px">${spells.map(cardHTML).join('')}</div>`;
      if (village.length) gridHtml += `
        <div style="font-size:11px;color:#ffc870;margin-bottom:6px;font-weight:600;letter-spacing:0.5px">🏘 村民（${village.length}）</div>
        <div class="card-grid" style="margin-bottom:14px">${village.map(cardHTML).join('')}</div>`;
      if (other.length) gridHtml += `
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:600;letter-spacing:0.5px">其他（${other.length}）</div>
        <div class="card-grid">${other.map(cardHTML).join('')}</div>`;
    } else if (!col) {
      gridHtml = `<div class="card-grid">${groups[g].map(cardHTML).join('')}</div>`;
    }
    
    html += `<div class="section-group ${rgCls}">
      <div class="section-group-header" onclick="toggleGroup('${g}')">
        <h3>${label} <span class="cnt">(${groups[g].length})</span></h3>
        <span class="tog">${col?'▶':'▼'}</span>
      </div>
      ${gridHtml}
    </div>`;
  });

  return `
    <div class="filter-bar">
      <!-- 💡 新增：排列模式切換按鈕區 -->
      <div class="sort-group">
        <button class="filter-btn ${S.filter.sortMode==='id'?'active':''}" onclick="setFilter('sortMode','id')">🔢 按編號排列</button>
        <button class="filter-btn ${S.filter.sortMode==='rarity'?'active':''}" onclick="setFilter('sortMode','rarity')">⭐ 按入手難度排列</button>
      </div>
      
      <input type="text" placeholder="🔍 搜尋卡片名稱或編號…" value="${S.filter.search}" oninput="setFilter('search',this.value)">
      <button class="filter-btn ${S.filter.status==='all'?'active':''}" onclick="setFilter('status','all')">全部</button>
      <button class="filter-btn ${S.filter.status==='have'?'have-active':''}" onclick="setFilter('status','have')">✓ 我有的</button>
      <button class="filter-btn ${S.filter.status==='want'?'want-active':''}" onclick="setFilter('status','want')">♥ 我要的</button>
      <button class="filter-btn ${S.filter.status==='neither'?'active':''}" onclick="setFilter('status','neither')">未設定</button>
      <button class="filter-btn ${S.filter.story?'story-active':''}" onclick="toggleStory()" title="只顯示劇情卡">📖 劇情卡</button>
      <select class="filter-select" onchange="setFilter('rarity',this.value)">
        <option value="all" ${S.filter.rarity==='all'?'selected':''}>全部分類</option>
        ${['SS','S','A','B','C','D','FP'].map(g=>`<option value="${g}" ${S.filter.rarity===g?'selected':''}>${GROUP_LABELS_RARITY[g]||g}</option>`).join('')}
      </select>
      <button class="btn-secondary" style="margin-left:auto; background:var(--gold); color:#000; font-weight:bold" onclick="manualSave()">💾 儲存設定</button>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-dot" style="background:#555"></div>共 ${CARDS.length} 張</div>
      <div class="stat-item"><div class="stat-dot" style="background:var(--green)"></div>我有 <strong style="color:var(--green-light);margin-left:3px">${S.have.size}</strong> 張</div>
      <div class="stat-item"><div class="stat-dot" style="background:var(--red)"></div>我要 <strong style="color:#ff7070;margin-left:3px">${S.want.size}</strong> 張</div>
      ${S.filter.story ? `<div class="stat-item"><div class="stat-dot" style="background:var(--gold)"></div><span style="color:var(--gold)">劇情卡模式</span></div>` : ''}
      <div class="stat-item" style="margin-left:auto;color:var(--text-dim)">顯示 ${list.length} 張</div>
    </div>
    ${list.length===0 ? '<div class="empty-state"><div class="icon">🃏</div><h3>沒有符合條件的卡片</h3><p>試試放寬篩選條件</p></div>' : html}`;
}

function renderBoard() {
  const all = [...MOCK_USERS, ...S.imported];
  const scored = all.map(u => {
    const uH = new Set(u.have), uW = new Set(u.want);
    const theyHaveIWant = [...S.want].filter(id => uH.has(id)).length;
    const iHaveTheyWant = [...uW].filter(id => S.have.has(id)).length;
    return {...u, theyHaveIWant, iHaveTheyWant, score: theyHaveIWant + iHaveTheyWant};
  }).sort((a,b) => b.score - a.score);

  const myCode = mkCode();
  const userRows = scored.map(u => {
    const mCls = (u.theyHaveIWant>0 && u.iHaveTheyWant>0) ? 'match-perfect' :
                 (u.score>0) ? 'match-good' : '';
    const mLabel = mCls==='match-perfect' ? '🔥 雙向' : mCls==='match-good' ? '✨ 單向' : '—';
    return `<div class="user-card ${mCls}" onclick='showUser(${JSON.stringify(u).replace(/'/g,"\\'")})'>
      <div class="user-avatar-lg">${u.nickname[0]||'?'}</div>
      <div class="user-details">
        <div class="user-name">${escH(u.nickname)}</div>
        <div class="user-stats">
          <span>✓ 有 <strong style="color:var(--green-light)">${u.have.length}</strong></span>
          <span>♥ 要 <strong style="color:#ff7070">${u.want.length}</strong></span>
          ${u.contact ? `<span>📬 ${escH(u.contact)}</span>` : ''}
        </div>
      </div>
      <div class="match-score">
        <div class="match-label">${mLabel}</div>
        <div class="match-value">${u.score>0?u.score+' 項':'-'}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="board-container">
    <div class="share-section">
      <h3>📤 分享我的卡片清單給朋友</h3>
      <div class="share-code-display" id="shareCodeEl">${myCode}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-secondary" onclick="copyMyCode()">📋 複製代碼</button>
        <button class="btn-secondary" onclick="openProfileModal()">✏️ 編輯個人資料</button>
      </div>
    </div>
    <div class="board-toolbar">
      <div style="font-size:14px;font-weight:bold;color:var(--gold)">👥 交換看板</div>
      <input class="code-input" id="importInput" placeholder="貼上朋友的代碼來加入看板…">
      <button class="btn-secondary" onclick="doImport()">匯入</button>
    </div>
    <div class="user-list">
      ${scored.length===0
        ? '<div class="empty-state"><div class="icon">👥</div><h3>看板目前沒有其他玩家</h3><p>把你的代碼分享給朋友，請他們匯入！</p></div>'
        : userRows}
    </div>
  </div>`;
}

function renderMatch() {
  const all = [...MOCK_USERS, ...S.imported];
  const perfect = all.filter(u => {
    const uH = new Set(u.have), uW = new Set(u.want);
    return [...S.want].some(id=>uH.has(id)) && [...uW].some(id=>S.have.has(id));
  });

  if (!S.have.size && !S.want.size) {
    return `<div class="empty-state">
      <div class="icon">📋</div>
      <h3>尚未設定卡片清單</h3>
      <p>先到「卡片設定」頁面選擇你有和你要的卡片，再來這裡尋找配對！</p>
    </div>`;
  }
  if (!perfect.length) {
    return `<div class="empty-state">
      <div class="icon">🔍</div>
      <h3>目前沒有雙向配對</h3>
      <p>繼續設定卡片清單，或到「交換看板」匯入更多玩家的代碼！</p>
    </div>`;
  }

  const cards = perfect.map(u => {
    const uH = new Set(u.have), uW = new Set(u.want);
    const theyHave = [...S.want].filter(id=>uH.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
    const iHave    = [...uW].filter(id=>S.have.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
    return `<div class="match-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div class="user-avatar-lg">${u.nickname[0]}</div>
        <div>
          <div style="font-weight:bold;font-size:15px">${escH(u.nickname)}</div>
          <div style="font-size:12px;color:var(--text-dim)">${escH(u.contact)||'（未提供聯絡方式）'}</div>
        </div>
        <div style="margin-left:auto;text-align:center">
          <div style="font-size:10px;color:var(--text-dim)">配對強度</div>
          <div style="font-size:22px;color:var(--gold);font-weight:bold">🔥${theyHave.length+iHave.length}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:11px;color:var(--green-light);margin-bottom:6px;font-weight:600">✓ 他有・我想要（${theyHave.length}張）</div>
          ${theyHave.map(id=>`<span class="tag-chip tag-have" title="${CARDS.find(c=>c.id===id)?.name||''}">${cardLabel(id)}</span>`).join('')}
        </div>
        <div>
          <div style="font-size:11px;color:#ff7070;margin-bottom:6px;font-weight:600">♥ 我有・他想要（${iHave.length}張）</div>
          ${iHave.map(id=>`<span class="tag-chip tag-want" title="${CARDS.find(c=>c.id===id)?.name||''}">${cardLabel(id)}</span>`).join('')}
        </div>
      </div>
      <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px;display:flex;justify-content:flex-end">
        <button class="btn-primary" style="width:auto;padding:8px 20px;font-size:13px;" onclick="startChat('${u.id}')">💬 發起交換私訊</button>
      </div>
    </div>`;
  }).join('');

  return `<div style="max-width:800px">
    <div style="margin-bottom:14px;font-size:13px;color:var(--text-dim)">
      找到 <strong style="color:var(--gold)">${perfect.length}</strong> 個雙向配對
    </div>
    ${cards}
  </div>`;
}

// 渲染對話畫面
function renderChat() {
  if (!S.activeChatUser) return `<div class="empty-state">請先從交換看板選擇玩家。</div>`;
  const u = S.activeChatUser;
  
  const uH = new Set(u.have), uW = new Set(u.want);
  const iGiveThem = [...uW].filter(id=>S.have.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  const theyGiveMe = [...S.want].filter(id=>uH.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));

  const iGiveHtml = iGiveThem.length > 0 
    ? iGiveThem.map(id=>`<span class="tag-chip tag-have">${cardLabel(id)}</span>`).join('')
    : '<span style="color:var(--text-dim);font-size:11px">無相符卡片</span>';
    
  const theyGiveHtml = theyGiveMe.length > 0
    ? theyGiveMe.map(id=>`<span class="tag-chip tag-want">${cardLabel(id)}</span>`).join('')
    : '<span style="color:var(--text-dim);font-size:11px">無相符卡片</span>';

  const msgs = S.chats[u.id] || [];
  const msgHtml = msgs.length === 0 
    ? '<div style="text-align:center;color:var(--text-dim);margin-top:20px;font-size:13px">還沒有任何訊息，試著當第一個發言的人吧！</div>'
    : msgs.map(m => `<div class="chat-msg ${m.sender==='me'?'mine':'theirs'}">${escH(m.text)}</div>`).join('');

  return `
    <div class="chat-container">
      <div class="chat-sidebar">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
          <div class="user-avatar-lg" style="width:36px;height:36px;font-size:14px">${u.nickname[0]||'?'}</div>
          <div>
            <div style="font-weight:bold;font-size:15px">${escH(u.nickname)}</div>
            <div style="font-size:11px;color:var(--green-light)">● 線上</div>
          </div>
        </div>
        
        <h3 style="font-size:13px;color:var(--text);margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:5px">雙方交換清單</h3>
        
        <div class="trade-box">
          <h4>📤 我方提供 (他需要的)</h4>
          <div style="line-height:1.6">${iGiveHtml}</div>
        </div>
        
        <div class="trade-box">
          <h4>📥 對方提供 (我需要的)</h4>
          <div style="line-height:1.6">${theyGiveHtml}</div>
        </div>
        
        <button class="btn-secondary" style="margin-top:auto" onclick="switchView('board')">← 返回看板</button>
      </div>
      
      <div class="chat-main">
        <div class="chat-header">
          <div style="font-weight:bold;color:var(--gold)">與 ${escH(u.nickname)} 的交換視窗</div>
          <div style="font-size:12px;color:var(--text-dim)">ID: ${u.id}</div>
        </div>
        <div class="chat-messages" id="chatHistory">
          ${msgHtml}
        </div>
        <div class="chat-input-area">
          <input type="text" id="chatInputMsg" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') sendChatMessage()">
          <button onclick="sendChatMessage()">送出</button>
        </div>
      </div>
    </div>
  `;
}

// ==================== ACTIONS ====================
function toggleHave(id, e) {
  e.stopPropagation();
  S.have.has(id) ? S.have.delete(id) : S.have.add(id);
  persist(); refreshCard(id); updateStats();
}
function toggleWant(id, e) {
  e.stopPropagation();
  S.want.has(id) ? S.want.delete(id) : S.want.add(id);
  persist(); refreshCard(id); updateStats();
}
function refreshCard(id) {
  const card = CARDS.find(c=>c.id===id); if (!card) return;
  const el = document.querySelector(`.card-item[data-id="${id}"]`); if (!el) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = cardHTML(card);
  el.replaceWith(tmp.firstElementChild);
}
function updateStats() {
  const bar = document.querySelector('.stats-bar'); if (!bar) return;
  const items = bar.querySelectorAll('.stat-item');
  if (items[1]) items[1].innerHTML = `<div class="stat-dot" style="background:var(--green)"></div>我有 <strong style="color:var(--green-light);margin-left:3px">${S.have.size}</strong> 張`;
  if (items[2]) items[2].innerHTML = `<div class="stat-dot" style="background:var(--red)"></div>我要 <strong style="color:#ff7070;margin-left:3px">${S.want.size}</strong> 張`;
}
function setFilter(k, v) { 
  S.filter[k] = v; 
  if(k === 'sortMode') persist(); // 若切換排列模式則馬上存檔記憶
  render(); 
}
function toggleStory() { S.filter.story = !S.filter.story; render(); }
function toggleGroup(r) { S.collapsed[r]=!S.collapsed[r]; render(); }
function switchView(v) {
  S.view = v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById(`nav-${v}`); if (btn) btn.classList.add('active');
  render();
  if (v === 'chat') setTimeout(scrollToBottom, 50); 
}
function render() {
  const el = document.getElementById('mainContent');
  if (S.view==='cards') el.innerHTML = renderCards();
  else if (S.view==='board') el.innerHTML = renderBoard();
  else if (S.view==='match') el.innerHTML = renderMatch();
  else if (S.view==='chat') el.innerHTML = renderChat();
}

function manualSave() {
  persist();
  toast('✅ 你的卡片進度已成功儲存！');
}

// ==================== CHAT ACTIONS ====================
function startChat(uid) {
  const all = [...MOCK_USERS, ...S.imported];
  S.activeChatUser = all.find(u => u.id === uid);
  if (!S.chats[uid]) S.chats[uid] = [];
  closeModal();
  switchView('chat');
}

function sendChatMessage() {
  const input = document.getElementById('chatInputMsg');
  const text = input.value.trim();
  if (!text || !S.activeChatUser) return;
  
  const uid = S.activeChatUser.id;
  S.chats[uid].push({ sender: 'me', text: text });
  input.value = '';
  persist();
  updateChatHistory();
  
  setTimeout(() => {
    if (S.activeChatUser && S.activeChatUser.id === uid) {
      S.chats[uid].push({ sender: 'them', text: "收到！我晚點確認一下我的卡夾，等等回覆你喔！" });
      persist();
      updateChatHistory();
    }
  }, 1200);
}

function updateChatHistory() {
  if (S.view !== 'chat' || !S.activeChatUser) return;
  const uid = S.activeChatUser.id;
  const msgs = S.chats[uid] || [];
  const html = msgs.map(m => `<div class="chat-msg ${m.sender==='me'?'mine':'theirs'}">${escH(m.text)}</div>`).join('');
  const container = document.getElementById('chatHistory');
  if (container) {
    container.innerHTML = html;
    scrollToBottom();
  }
}

function scrollToBottom() {
  const el = document.getElementById('chatHistory');
  if (el) el.scrollTop = el.scrollHeight;
}

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <h2 style="color:var(--gold)">👤 個人資料設定</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label>遊戲暱稱 <span style="color:var(--red)">*</span></label>

    </div>
    <div class="form-group">
      <label>聯絡方式（選填）</label>
      <input type="text" id="ci" value="${escH(S.contact)}" placeholder="例：Discord: xxx#0000 / Line: yyy">
    </div>
    <button class="btn-primary" onclick="saveProfile()">儲存</button>`;
  document.getElementById('modalOverlay').style.display = 'flex';

function saveProfile() {
  const n = document.getElementById('ni').value.trim();
  const c = document.getElementById('ci').value.trim();
  if (!n) { toast('請輸入暱稱！'); return; }
  S.nickname = n; S.contact = c;
  persist(); updateHeader(); closeModal(); toast('個人資料已儲存 ✓');
}
function updateHeader() {
  const av = document.getElementById('headerAvatar');
  const nm = document.getElementById('headerName');
  if (av) av.textContent = S.nickname ? S.nickname[0].toUpperCase() : '?';
  if (nm) nm.textContent = S.nickname || '設定暱稱';
}

// ==================== SHARE CODE ====================
function mkCode() {
  return btoa(unescape(encodeURIComponent(JSON.stringify({
    n: S.nickname, c: S.contact, h:[...S.have], w:[...S.want]
  }))));
}
function copyMyCode() {
  navigator.clipboard.writeText(mkCode())
    .then(()=>toast('代碼已複製！分享給朋友吧 ✓'))
    .catch(()=>{ selectText('shareCodeEl'); toast('請手動選取代碼並複製'); });
}
function selectText(id) {
  const el = document.getElementById(id); if (!el) return;
  const r = document.createRange(); r.selectNodeContents(el);
  const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
}
function doImport() {
  const raw = (document.getElementById('importInput')||{}).value?.trim();
  if (!raw) { toast('請貼上代碼！'); return; }
  try {
    const d = JSON.parse(decodeURIComponent(escape(atob(raw))));
    if (!d.n) throw new Error('no nickname');
    const uid = raw.slice(0,12);
    const user = {id:uid, nickname:d.n, contact:d.c||'', have:d.h||[], want:d.w||[]};
    const idx = S.imported.findIndex(u=>u.id===uid);
    if (idx>=0) { S.imported[idx]=user; toast(`已更新 ${d.n} 的資料`); }
    else        { S.imported.push(user); toast(`已加入 ${d.n} 到交換看板 ✓`); }
    persist(); render();
  } catch { toast('代碼無效，請確認後再試'); }
}

// ==================== USER MODAL ====================
function showUser(u) {
  const uH = new Set(u.have), uW = new Set(u.want);
  const theyHaveIWant = [...S.want].filter(id=>uH.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  const iHaveTheyWant = [...uW].filter(id=>S.have.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  const sortedHave = [...u.have].sort((a,b)=>getSortValue(a)-getSortValue(b));
  const sortedWant = [...u.want].sort((a,b)=>getSortValue(a)-getSortValue(b));

  const haveList = sortedHave.map(id => {
    const hi = S.want.has(id);
    return `<span class="tag-chip ${hi?'tag-have':'tag-normal'}" title="${CARDS.find(c=>c.id===id)?.name||''}">${cardLabel(id)}${hi?' ✓':''}</span>`;
  }).join('');
  const wantList = sortedWant.map(id => {
    const hi = S.have.has(id);
    return `<span class="tag-chip ${hi?'tag-want':'tag-normal'}" title="${CARDS.find(c=>c.id===id)?.name||''}">${cardLabel(id)}${hi?' ✓':''}</span>`;
  }).join('');

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <h2 style="color:var(--gold)">${escH(u.nickname)} 的清單</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    ${u.contact ? `<div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;padding:10px;background:var(--bg3);border-radius:8px">📬 ${escH(u.contact)}</div>` : ''}
    ${(theyHaveIWant.length||iHaveTheyWant.length) ? `
      <div style="background:rgba(201,168,76,0.08);border:1px solid var(--gold);border-radius:8px;padding:12px;margin-bottom:14px">
        <div style="font-size:13px;color:var(--gold);font-weight:bold;margin-bottom:8px">🔥 配對摘要</div>
        ${theyHaveIWant.length ? `<div style="font-size:12px;margin-bottom:4px;color:var(--green-light)">✓ 他有・你要：${theyHaveIWant.map(cardLabel).join('、')}</div>` : ''}
        ${iHaveTheyWant.length ? `<div style="font-size:12px;color:#ff7070">♥ 你有・他要：${iHaveTheyWant.map(cardLabel).join('、')}</div>` : ''}
      </div>` : ''}
    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--green-light);font-weight:600;margin-bottom:8px">✓ 可提供交換（${u.have.length}張）</div>
      <div style="line-height:2">${haveList || '<span style="color:var(--text-dim);font-size:12px">未設定</span>'}</div>
    </div>
    <div>
      <div style="font-size:12px;color:#ff7070;font-weight:600;margin-bottom:8px">♥ 希望取得（${u.want.length}張）</div>
      <div style="line-height:2">${wantList || '<span style="color:var(--text-dim);font-size:12px">未設定</span>'}</div>
    </div>
    <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:15px;display:flex;justify-content:flex-end">
      <button class="btn-primary" style="width:auto;padding:10px 24px;" onclick="startChat('${u.id}')">💬 發起交換私訊</button>
    </div>`;
  document.getElementById('modalOverlay').style.display = 'flex';
}

// ==================== UTILS ====================
function closeModal() { document.getElementById('modalOverlay').style.display='none'; }
function onOverlayClick(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }
function toast(msg) {
  document.querySelector('.toast')?.remove();
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
}
function escH(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ==================== INIT ====================
updateHeader();
render();
if (!S.nickname) setTimeout(openProfileModal, 600);
</script>
</body>
</html>
