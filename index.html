<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>G.I. 貪婪之島 卡片交換系統</title>
<style>
:root {
  --bg: #0d0d1a; --bg2: #1a1a2e; --bg3: #16213e;
  --gold: #c9a84c; --gold-light: #f0c060;
  --green: #27ae60; --green-light: #2ecc71;
  --orange: #e67e22; --red: #e74c3c;
  --text: #e8e8f0; --text-dim: #7a7a9a;
  --border: #2a2a4a; --card-w: 128px; --card-img-h: 128px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Microsoft JhengHei','Noto Sans TC','PingFang TC',sans-serif; min-height:100vh; }

/* HEADER */
.header { background:linear-gradient(135deg,#0a0a18 0%,#1a1a2e 100%); border-bottom:2px solid var(--gold); padding:0 20px; display:flex; align-items:center; gap:16px; height:58px; position:sticky; top:0; z-index:100; box-shadow:0 2px 24px rgba(201,168,76,0.25); }
.logo { font-size:18px; font-weight:bold; color:var(--gold); text-shadow:0 0 12px rgba(201,168,76,0.6); white-space:nowrap; letter-spacing:1px; }
.nav { display:flex; gap:4px; flex:1; }
.nav-btn { background:transparent; border:1px solid transparent; color:var(--text-dim); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; transition:all 0.2s; white-space:nowrap; position:relative; }
.nav-btn:hover { color:var(--text); border-color:var(--border); }
.nav-btn.active { background:rgba(201,168,76,0.12); border-color:var(--gold); color:var(--gold); }
/* 未讀紅點 */
.nav-unread { position:absolute; top:4px; right:6px; width:8px; height:8px; border-radius:50%; background:var(--red); display:none; }
.nav-unread.show { display:block; }
.user-chip { display:flex; align-items:center; gap:8px; cursor:pointer; padding:4px 10px 4px 4px; border-radius:20px; border:1px solid var(--border); background:var(--bg2); transition:border-color 0.2s; }
.user-chip:hover { border-color:var(--gold); }
.user-avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--orange)); display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:13px; color:#000; flex-shrink:0; }
.user-name-chip { font-size:13px; color:var(--text-dim); }

/* 未儲存橫幅 */
.unsaved-banner { background:rgba(231,76,60,0.12); border-bottom:1px solid rgba(231,76,60,0.4); padding:6px 20px; font-size:12px; color:#ff9090; display:flex; align-items:center; gap:10px; }
.unsaved-banner button { background:var(--red); border:none; border-radius:4px; padding:3px 10px; color:#fff; font-size:11px; cursor:pointer; font-weight:bold; }

.main { padding:18px 20px; }

/* FILTER BAR */
.filter-bar { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; margin-bottom:14px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.filter-bar input[type="text"] { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:7px 12px; color:var(--text); font-size:13px; outline:none; width:190px; transition:border-color 0.2s; }
.filter-bar input[type="text"]:focus { border-color:var(--gold); }
.filter-btn { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:6px 11px; color:var(--text-dim); font-size:12px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.filter-btn:hover { color:var(--text); border-color:#444466; }
.filter-btn.active { background:rgba(201,168,76,0.12); border-color:var(--gold); color:var(--gold); }
.filter-btn.have-active { background:rgba(39,174,96,0.12); border-color:var(--green); color:var(--green-light); }
.filter-btn.want-active { background:rgba(231,76,60,0.12); border-color:var(--red); color:#ff7070; }
.filter-select { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:var(--text); font-size:12px; cursor:pointer; outline:none; }
.sort-group { display:flex; gap:4px; padding-right:12px; margin-right:4px; border-right:1px solid var(--border); }
.stats-bar { display:flex; gap:14px; margin-bottom:14px; font-size:12px; color:var(--text-dim); align-items:center; flex-wrap:wrap; }
.stat-item { display:flex; align-items:center; gap:5px; }
.stat-dot { width:7px; height:7px; border-radius:50%; }

/* SECTION GROUP */
.section-group { margin-bottom:18px; }
.section-group-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; cursor:pointer; user-select:none; padding:6px 4px; border-bottom:1px solid var(--border); }
.section-group-header h3 { font-size:13px; font-weight:600; }
.section-group-header .cnt { font-size:11px; color:var(--text-dim); opacity:0.8; }
.section-group-header .tog { margin-left:auto; color:var(--text-dim); font-size:11px; }
.rg-SS h3{color:#d4a017} .rg-S h3{color:#9b59b6} .rg-A h3{color:#3498db} .rg-B h3{color:#27ae60}
.rg-C h3{color:#aaa} .rg-D h3{color:#888} .rg-DP h3{color:#3498db} .rg-FP h3{color:#a060e0}

/* CARD */
.card-grid { display:flex; flex-wrap:wrap; gap:10px; }
.card-item { width:var(--card-w); background:var(--bg2); border:2px solid var(--border); border-radius:8px; overflow:hidden; transition:border-color 0.18s,box-shadow 0.18s,transform 0.15s; cursor:default; position:relative; flex-shrink:0; }
.card-item:hover { border-color:#3a3a5a; transform:translateY(-3px); box-shadow:0 6px 18px rgba(0,0,0,0.5); }
.card-item.have { border-color:var(--green); box-shadow:0 0 12px rgba(39,174,96,0.3); }
.card-item.want { border-color:var(--red); box-shadow:0 0 12px rgba(231,76,60,0.3); }
.card-item.have.want { border-color:var(--gold); box-shadow:0 0 12px rgba(201,168,76,0.35); }
.card-img-wrap { width:100%; height:var(--card-img-h); position:relative; overflow:hidden; background:#060610; }
.card-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.card-no-img { width:100%; height:100%; display:none; align-items:center; justify-content:center; font-size:32px; color:var(--text-dim); }
.card-rarity-badge { position:absolute; top:4px; right:4px; padding:2px 6px; border-radius:3px; font-size:10px; font-weight:bold; letter-spacing:0.5px; }
.rarity-SS{background:#8b6914;color:#ffd970} .rarity-S{background:#5a0c8c;color:#e0b8ff} .rarity-A{background:#1a4a7a;color:#90ccff} .rarity-B{background:#1a4a1a;color:#90e090} .rarity-C{background:#3a3a3a;color:#ccc} .rarity-D{background:#2a2a2a;color:#999} .rarity-dsh{background:#1a1a1a;color:#555}
.sub-badge { position:absolute; top:24px; right:4px; padding:1px 5px; border-radius:3px; font-size:9px; font-weight:bold; }
.sub-spell{background:#3a0070;color:#d8b4ff} .sub-village{background:#4a2a00;color:#ffc870}
.story-corner { position:absolute; top:0; left:0; width:0; height:0; border-top:22px solid rgba(201,168,76,0.85); border-right:22px solid transparent; }
.story-corner::after { content:'📖'; position:absolute; top:-20px; left:0; font-size:10px; line-height:1; }
.card-status-badges { position:absolute; top:4px; left:4px; display:flex; flex-direction:column; gap:2px; }
.status-badge { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:bold; }
.have-badge{background:var(--green);color:#fff} .want-badge{background:var(--red);color:#fff}
.card-info { padding:5px 7px 7px; }
.card-num { font-size:10px; color:var(--text-dim); margin-bottom:2px; }
.card-name { font-size:11px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; line-height:1.3; margin-bottom:5px; }
.card-actions { display:flex; gap:4px; }
.action-btn { flex:1; padding:4px 0; border-radius:4px; border:1px solid; font-size:10px; cursor:pointer; transition:all 0.15s; font-weight:500; text-align:center; }
.have-btn{background:transparent;border-color:#294229;color:#4a7a4a}
.have-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.have-btn:hover{background:rgba(39,174,96,0.18);border-color:var(--green-light);color:var(--green-light)}
.want-btn{background:transparent;border-color:#52202a;color:#8a4a4a}
.want-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.want-btn:hover{background:rgba(231,76,60,0.18);border-color:#ff7070;color:#ff7070}

/* BOARD */
.board-container { max-width:860px; }
.btn-secondary { background:var(--bg2); border:1px solid var(--gold); border-radius:8px; padding:8px 14px; color:var(--gold); font-size:13px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.btn-secondary:hover { background:rgba(201,168,76,0.12); }
.user-list { display:flex; flex-direction:column; gap:10px; }
.user-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:13px 15px; display:flex; align-items:center; gap:13px; cursor:pointer; transition:all 0.2s; }
.user-card:hover { border-color:#3a3a5a; box-shadow:0 3px 12px rgba(0,0,0,0.35); }
.user-card.match-perfect { border-color:var(--gold); background:rgba(201,168,76,0.05); }
.user-card.match-good { border-color:var(--green); background:rgba(39,174,96,0.04); }
.user-avatar-lg { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--orange)); display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:17px; color:#000; flex-shrink:0; }
.user-details { flex:1; }
.user-name { font-size:14px; font-weight:bold; margin-bottom:4px; display:flex; align-items:center; }
.user-name-tags { margin-left:8px; font-size:12px; font-weight:normal; color:var(--text-dim); display:flex; align-items:center; gap:4px; }
.user-stats { display:flex; gap:12px; font-size:12px; color:var(--text-dim); flex-wrap:wrap; }
.match-score { text-align:right; flex-shrink:0; }
.match-label { font-size:10px; color:var(--text-dim); margin-bottom:2px; }
.match-value { font-size:18px; font-weight:bold; color:var(--text-dim); }
.match-perfect .match-value{color:var(--gold)} .match-good .match-value{color:var(--green-light)}

.match-card { background:var(--bg2); border:1px solid var(--gold); border-radius:10px; padding:15px; margin-bottom:12px; }
.tag-chip { display:inline-block; font-size:11px; padding:3px 7px; border-radius:4px; margin:2px; }
.tag-have{background:rgba(39,174,96,0.15);border:1px solid rgba(39,174,96,0.4);color:var(--green-light)}
.tag-want{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.4);color:#ff7a7a}
.tag-normal{background:var(--bg3);border:1px solid var(--border);color:var(--text)}

/* ===== CHAT VIEW (重新設計) ===== */
.chat-layout { display:flex; gap:0; height:calc(100vh - 96px); border:1px solid var(--border); border-radius:12px; overflow:hidden; }

/* 左側：對話列表 */
.chat-list-panel { width:280px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.chat-list-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.chat-list-header h3 { font-size:14px; color:var(--gold); font-weight:bold; }
.chat-list-scroll { flex:1; overflow-y:auto; }
.chat-thread-item { padding:12px 16px; border-bottom:1px solid rgba(42,42,74,0.6); cursor:pointer; transition:background 0.15s; display:flex; align-items:center; gap:10px; }
.chat-thread-item:hover { background:rgba(255,255,255,0.03); }
.chat-thread-item.active { background:rgba(201,168,76,0.08); border-left:3px solid var(--gold); }
.chat-thread-item.unread { background:rgba(231,76,60,0.06); }
.thread-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--orange)); display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px; color:#000; flex-shrink:0; position:relative; }
.thread-unread-dot { position:absolute; top:-2px; right:-2px; width:10px; height:10px; border-radius:50%; background:var(--red); border:2px solid var(--bg2); }
.thread-info { flex:1; min-width:0; }
.thread-name { font-size:13px; font-weight:600; margin-bottom:2px; display:flex; align-items:center; justify-content:space-between; }
.thread-name-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.thread-time { font-size:10px; color:var(--text-dim); flex-shrink:0; }
.thread-preview { font-size:11px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chat-list-empty { padding:40px 20px; text-align:center; color:var(--text-dim); font-size:13px; }

/* 右側：聊天視窗 */
.chat-panel { flex:1; display:flex; flex-direction:column; min-width:0; background:var(--bg); }
.chat-panel-header { padding:12px 16px; border-bottom:1px solid var(--border); background:var(--bg2); display:flex; align-items:center; gap:12px; }
.chat-panel-info { flex:1; }
.chat-panel-name { font-size:14px; font-weight:bold; color:var(--gold); }
.chat-panel-sub { font-size:11px; color:var(--text-dim); margin-top:2px; }
.chat-panel-actions { display:flex; gap:8px; }
.chat-messages { flex:1; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
.chat-msg-wrap { display:flex; align-items:flex-end; gap:8px; }
.chat-msg-wrap.mine { flex-direction:row-reverse; }
.chat-msg-avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--orange)); display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:11px; color:#000; flex-shrink:0; }
.chat-msg { max-width:68%; padding:9px 13px; border-radius:16px; font-size:13px; line-height:1.5; word-wrap:break-word; }
.chat-msg-wrap.mine .chat-msg { background:var(--gold); color:#000; border-bottom-right-radius:4px; }
.chat-msg-wrap:not(.mine) .chat-msg { background:var(--bg2); border:1px solid var(--border); color:var(--text); border-bottom-left-radius:4px; }
.chat-msg-time { font-size:10px; color:var(--text-dim); padding-bottom:2px; }
.chat-date-divider { text-align:center; font-size:11px; color:var(--text-dim); margin:8px 0; display:flex; align-items:center; gap:10px; }
.chat-date-divider::before,.chat-date-divider::after { content:''; flex:1; height:1px; background:var(--border); }
.chat-input-area { padding:12px 16px; border-top:1px solid var(--border); background:var(--bg2); display:flex; gap:10px; align-items:flex-end; }
.chat-input-area textarea { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:9px 14px; color:var(--text); outline:none; resize:none; font-family:inherit; font-size:13px; line-height:1.4; max-height:100px; overflow-y:auto; }
.chat-input-area textarea:focus { border-color:var(--gold); }
.chat-send-btn { background:var(--gold); color:#000; border:none; border-radius:12px; padding:9px 18px; font-weight:bold; cursor:pointer; transition:opacity 0.2s; font-size:13px; flex-shrink:0; }
.chat-send-btn:hover { opacity:0.85; }
.chat-no-select { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; color:var(--text-dim); }

/* 側邊欄：交換摘要 */
.chat-sidebar-panel { width:240px; flex-shrink:0; background:var(--bg2); border-left:1px solid var(--border); padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
.trade-box { background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:8px; padding:10px; }
.trade-box h4 { font-size:11px; color:var(--gold); margin-bottom:8px; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(3px); }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:22px 24px; max-width:450px; width:100%; max-height:85vh; overflow-y:auto; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.8); }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.modal-close { background:transparent; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; padding:4px; }
.modal-close:hover { color:var(--text); }

/* FORM */
.btn-primary { width:100%; background:linear-gradient(135deg,var(--gold),#9a6c1a); border:none; border-radius:8px; padding:11px; color:#000; font-size:15px; font-weight:bold; cursor:pointer; transition:opacity 0.2s,transform 0.1s; margin-top:10px; }
.btn-primary:hover{opacity:0.92} .btn-primary:active{transform:scale(0.98)}
.form-group { margin-bottom:16px; }
.form-group label { display:block; margin-bottom:7px; color:var(--gold); font-size:13px; font-weight:bold; }
.form-group input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:11px 13px; color:var(--text); font-size:14px; outline:none; transition:border-color 0.2s; }
.form-group input:focus { border-color:var(--gold); }
.form-group select { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:11px 13px; color:var(--text); font-size:14px; outline:none; transition:border-color 0.2s; appearance:none; cursor:pointer; }
.form-group select:focus { border-color:var(--gold); }

.empty-state { text-align:center; padding:50px 20px; color:var(--text-dim); }
.empty-state .icon { font-size:44px; margin-bottom:14px; }
.empty-state h3 { margin-bottom:8px; font-size:15px; }

.toast { position:fixed; bottom:22px; right:22px; background:var(--bg2); border:1px solid var(--gold); border-radius:8px; padding:11px 16px; color:var(--text); font-size:13px; z-index:300; box-shadow:0 4px 16px rgba(0,0,0,0.5); animation:slideIn 0.28s ease; }
@keyframes slideIn { from{transform:translateX(80px);opacity:0} to{transform:translateX(0);opacity:1} }

.auth-tabs { display:flex; margin-bottom:20px; border-bottom:1px solid var(--border); }
.auth-tab { flex:1; text-align:center; padding:10px; cursor:pointer; color:var(--text-dim); font-size:14px; font-weight:bold; transition:0.2s; }
.auth-tab.active { color:var(--gold); border-bottom:2px solid var(--gold); }

/* ADMIN 後台 */
.admin-layout { display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:1100px; }
.admin-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.admin-card-header { padding:12px 16px; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:space-between; }
.admin-card-header h3 { font-size:13px; color:var(--gold); font-weight:bold; }
.admin-table { width:100%; border-collapse:collapse; font-size:12px; }
.admin-table th { padding:8px 12px; text-align:left; color:var(--text-dim); border-bottom:1px solid var(--border); font-weight:600; font-size:11px; }
.admin-table td { padding:8px 12px; border-bottom:1px solid rgba(42,42,74,0.5); vertical-align:top; }
.admin-table tr:last-child td { border-bottom:none; }
.admin-table tr:hover td { background:rgba(255,255,255,0.02); }
.admin-full { grid-column:1/-1; }
.stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
.stat-box { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:14px; text-align:center; }
.stat-box .num { font-size:28px; font-weight:bold; color:var(--gold); }
.stat-box .lbl { font-size:11px; color:var(--text-dim); margin-top:4px; }
.badge { display:inline-block; padding:2px 6px; border-radius:3px; font-size:10px; font-weight:bold; }
.badge-green{background:rgba(39,174,96,0.2);color:var(--green-light)} .badge-red{background:rgba(231,76,60,0.2);color:#ff7070} .badge-gold{background:rgba(201,168,76,0.2);color:var(--gold-light)}

@media(max-width:900px) {
  .chat-sidebar-panel { display:none; }
  .chat-list-panel { width:220px; }
  .admin-layout { grid-template-columns:1fr; }
  .stat-grid { grid-template-columns:repeat(2,1fr); }
}
@media(max-width:600px) {
  :root{--card-w:108px;--card-img-h:108px}
  .header{height:50px;gap:12px} .logo{font-size:15px}
  .filter-bar input[type="text"]{width:140px} .main{padding:12px}
  .chat-list-panel{width:100%}
  .chat-panel{display:none}
  .chat-layout.panel-open .chat-list-panel{display:none}
  .chat-layout.panel-open .chat-panel{display:flex}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚔️ G.I. 卡片交換</div>
  <nav class="nav">
    <button class="nav-btn active" id="nav-cards"  onclick="window.switchView('cards')">🃏 卡片設定</button>
    <button class="nav-btn"        id="nav-board"  onclick="window.switchView('board')">📋 交換看板</button>
    <button class="nav-btn"        id="nav-match"  onclick="window.switchView('match')">🔥 配對搜尋</button>
    <button class="nav-btn"        id="nav-inbox"  onclick="window.switchView('inbox')">💬 訊息匣

function fmtTime(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);const now=new Date();const diff=now-d;if(diff<60000)return'剛剛';if(diff<3600000)return Math.floor(diff/60000)+'分前';if(diff<86400000)return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');return(d.getMonth()+1)+'/'+(d.getDate());}
function fmtFull(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;}
function dateDivider(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);const now=new Date();if(now.toDateString()===d.toDateString())return'今天';if(new Date(now-86400000).toDateString()===d.toDateString())return'昨天';return `${d.getMonth()+1}月${d.getDate()}日`;}

    console.log('你的 UID（管理員設定用）：', user.uid);
    const ref=doc(db,'artifacts',appId,'public','data','board',user.uid);
    getDoc(ref).then(snap=>{
      if(snap.exists()){const d=snap.data();S.nickname=d.nickname||'';S.contact=d.contact||'';S.location=d.location||'未設定';S.canShip=d.canShip||false;S.canMeet=d.canMeet||false;S.have=new Set(d.have||[]);S.want=new Set(d.want||[]);}
      updateHeader();setUnsaved(false);render();
    });
    listenToBoard();
    listenToThreads();
  } else {
    clearAllSubs();
    S.nickname='';S.location='未設定';S.canShip=false;S.canMeet=false;S.have=new Set();S.want=new Set();
    S.threads=[];S.activeThread=null;S.unreadTotal=0;
    updateHeader();render();
    setTimeout(window.openAuthModal,500);
  }
});

function listenToBoard(){
  if(boardUnsub){boardUnsub();boardUnsub=null;}
  const ref=collection(db,'artifacts',appId,'public','data','board');
  boardUnsub=onSnapshot(ref,snap=>{
    S.boardUsers=[];
    snap.forEach(d=>{if(d.id!==S.user?.uid)S.boardUsers.push(d.data());});
    if(S.view==='board'||S.view==='match')render();
  },err=>console.error('看板同步失敗',err));
}

// ==================== 即時訊息：Thread 列表監聽 ====================
// Firestore 路徑設計：
//   /artifacts/{appId}/public/data/threads/{threadId}
//     - participants: [uid1, uid2]
//     - lastMsg: string
//     - lastAt: Timestamp
//     - unread_{uid}: number（各方未讀計數）
//
//   /artifacts/{appId}/public/data/threads/{threadId}/messages/{msgId}
//     - senderUid: string
//     - senderName: string
//     - text: string
//     - at: Timestamp

function getThreadId(uid1,uid2){return [uid1,uid2].sort().join('_');}

function listenToThreads(){
  if(threadListUnsub){threadListUnsub();threadListUnsub=null;}
  if(!S.user)return;
  const threadsRef=collection(db,'artifacts',appId,'public','data','threads');
  const q=query(threadsRef,where('participants','array-contains',S.user.uid),orderBy('lastAt','desc'));
  threadListUnsub=onSnapshot(q,snap=>{
    S.threads=[];
    let unread=0;
    snap.forEach(d=>{
      const t={id:d.id,...d.data()};
      const myUnread=t[`unread_${S.user.uid}`]||0;
      t.myUnread=myUnread;
      unread+=myUnread;
      S.threads.push(t);
    });
    S.unreadTotal=unread;
    updateUnreadDot();
    if(S.view==='inbox')render();
  },err=>console.error('Thread 同步失敗',err));
}

function listenToMessages(threadId){
  if(messageUnsub){messageUnsub();messageUnsub=null;}
  if(!threadId)return;
  const msgsRef=collection(db,'artifacts',appId,'public','data','threads',threadId,'messages');
  const q=query(msgsRef,orderBy('at','asc'));
  messageUnsub=onSnapshot(q,snap=>{
    S.threadMessages=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(S.view==='inbox') renderChatPanel();
    else scrollChatToBottom();
  },err=>console.error('訊息同步失敗',err));
}

function updateUnreadDot(){
  const dot=document.getElementById('navUnreadDot');
  if(dot)dot.classList.toggle('show',S.unreadTotal>0);
}

// ==================== 訊息操作 ====================
async function sendMessage(text){
  if(!S.user||!S.activeThread||!text.trim())return;
  const threadId=S.activeThread;
  const threadRef=doc(db,'artifacts',appId,'public','data','threads',threadId);
  const threadSnap=await getDoc(threadRef);
  const thread=threadSnap.data();
  const otherUid=thread.participants.find(u=>u!==S.user.uid);

  // 寫入訊息
  await addDoc(collection(db,'artifacts',appId,'public','data','threads',threadId,'messages'),{
    senderUid:S.user.uid, senderName:S.nickname||'玩家',
    text:text.trim(), at:serverTimestamp()
  });
  // 更新 thread 摘要 + 對方未讀 +1
  await updateDoc(threadRef,{
    lastMsg:text.trim().slice(0,60),
    lastAt:serverTimestamp(),
    [`unread_${otherUid}`]:(thread[`unread_${otherUid}`]||0)+1,
    [`unread_${S.user.uid}`]:0
  });
}

async function markThreadRead(threadId){
  if(!S.user||!threadId)return;
  const threadRef=doc(db,'artifacts',appId,'public','data','threads',threadId);
  try{await updateDoc(threadRef,{[`unread_${S.user.uid}`]:0});}catch(e){}
}

async function getOrCreateThread(otherUid){
  const threadId=getThreadId(S.user.uid,otherUid);
  const threadRef=doc(db,'artifacts',appId,'public','data','threads',threadId);
  const snap=await getDoc(threadRef);
  if(!snap.exists()){
    // 找對方暱稱
    const otherRef=doc(db,'artifacts',appId,'public','data','board',otherUid);
    const otherSnap=await getDoc(otherRef);
    const otherName=otherSnap.exists()?otherSnap.data().nickname||'玩家':'玩家';
    await setDoc(threadRef,{
      participants:[S.user.uid,otherUid],
      names:{[S.user.uid]:S.nickname||'玩家',[otherUid]:otherName},
      lastMsg:'',lastAt:serverTimestamp(),
      [`unread_${S.user.uid}`]:0,[`unread_${otherUid}`]:0
    });
  }
  return threadId;
}

// ==================== CLOUD SAVE ====================
async function saveToCloud(){
  if(!S.user){window.toast('請先登入！');window.openAuthModal();return;}
  const ref=doc(db,'artifacts',appId,'public','data','board',S.user.uid);

function fmtId(id){return id<0||id>=1000?`#${id}`:`#${String(id).padStart(3,'0')}`;}
function cardLabel(id){const c=CARDS.find(c=>c.id===id);return c?`${fmtId(id)} ${c.name}`:`#${id}`;}
function rarityClass(r){return r==='F'||r==='G'||r==='-'?'rarity-dsh':`rarity-${r}`;}

function cardHTML(card){
  const h=S.have.has(card.id),w=S.want.has(card.id);

  const sub=SPELL_IDS.has(card.id)?'<div class="sub-badge sub-spell">咒語</div>':VILLAGE_IDS.has(card.id)?'<div class="sub-badge sub-village">村民</div>':'';

    </div>

      <div class="card-name" title="${card.name}">${card.name}</div>

        <button class="action-btn have-btn ${h?'active':''}" onclick="window.toggleHave(${card.id},event)">✓ 我有</button>
        <button class="action-btn want-btn ${w?'active':''}" onclick="window.toggleWant(${card.id},event)">♥ 我要</button>
      </div>

}

// ==================== VIEW: CARDS ====================
function filteredCards(){
  const q=S.filter.search.toLowerCase();
  return CARDS_SORTED.filter(c=>{
    if(q&&!c.name.toLowerCase().includes(q)&&!c.nameJP.toLowerCase().includes(q)&&!String(c.id).includes(q))return false;
    if(S.filter.rarity!=='all'&&cardGroup(c,'rarity')!==S.filter.rarity)return false;
    if(S.filter.status==='have'&&!S.have.has(c.id))return false;
    if(S.filter.status==='want'&&!S.want.has(c.id))return false;
    if(S.filter.status==='neither'&&(S.have.has(c.id)||S.want.has(c.id)))return false;
    if(S.filter.story&&!STORY_IDS.has(c.id))return false;
    return true;
  });
}

function renderCards(){
  if(!S.user)return`<div class="empty-state"><div class="icon">🔒</div><h3>請先登入</h3><p>登入後即可開始建立交換清單</p><button class="btn-primary" style="width:200px;margin-top:20px" onclick="window.openAuthModal()">立即登入</button></div>`;

  const lbls=S.filter.sortMode==='id'?GROUP_LABELS_ID:GROUP_LABELS_RARITY;
  let html='';
  ord.forEach(g=>{
    if(!groups[g]?.length)return;
    const col=S.collapsed[g];
    let grid='';
    if(g==='FP'&&!col){
      const sp=groups[g].filter(c=>SPELL_IDS.has(c.id)),vi=groups[g].filter(c=>VILLAGE_IDS.has(c.id)),ot=groups[g].filter(c=>!SPELL_IDS.has(c.id)&&!VILLAGE_IDS.has(c.id));

      if(ot.length)grid+=`<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:600">其他（${ot.length}）</div><div class="card-grid">${ot.map(cardHTML).join('')}</div>`;

    </div>

    <button class="filter-btn ${S.filter.status==='all'?'active':''}" onclick="window.setFilter('status','all')">全部</button>
    <button class="filter-btn ${S.filter.status==='have'?'have-active':''}" onclick="window.setFilter('status','have')">✓ 我有的</button>
    <button class="filter-btn ${S.filter.status==='want'?'want-active':''}" onclick="window.setFilter('status','want')">♥ 我要的</button>
    <select class="filter-select" onchange="window.setFilter('rarity',this.value)"><option value="all">全部分類</option>${['SS','S','A','B','C','D','FP'].map(g=>`<option value="${g}" ${S.filter.rarity===g?'selected':''}>${GROUP_LABELS_RARITY[g]||g}</option>`).join('')}</select>
    <button class="btn-secondary" style="margin-left:auto;background:var(--gold);color:#000;font-weight:bold" onclick="window.manualSave()">☁️ 儲存</button>
  </div>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-dot" style="background:#555"></div>共 ${CARDS.length} 張</div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--green)"></div>我有 <strong style="color:var(--green-light);margin-left:3px">${S.have.size}</strong></div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--red)"></div>我要 <strong style="color:#ff7070;margin-left:3px">${S.want.size}</strong></div>
    <div class="stat-item" style="margin-left:auto">顯示 ${list.length} 張</div>
  </div>
  ${list.length===0?'<div class="empty-state"><div class="icon">🃏</div><h3>沒有符合條件的卡片</h3></div>':html}`;

// ==================== VIEW: BOARD ====================
function renderBoard(){
  if(!S.user)return`<div class="empty-state"><div class="icon">🔒</div><h3>請先登入</h3></div>`;
  const scored=S.boardUsers.map(u=>{
    const uH=new Set(u.have||[]),uW=new Set(u.want||[]);
    const a=[...S.want].filter(id=>uH.has(id)).length,b=[...uW].filter(id=>S.have.has(id)).length;
    return{...u,theyHaveIWant:a,iHaveTheyWant:b,score:a+b};
  }).sort((a,b)=>b.score-a.score);
  const rows=scored.map(u=>{
    const mc=(u.theyHaveIWant>0&&u.iHaveTheyWant>0)?'match-perfect':(u.score>0)?'match-good':'';
    const ml=mc==='match-perfect'?'🔥 雙向':mc==='match-good'?'✨ 單向':'—';
    return`<div class="user-card ${mc}" data-uid="${escH(u.uid)}" onclick="window.showUserByUid(this.dataset.uid)">
      <div class="user-avatar-lg">${escH((u.nickname||'?')[0])}</div>
      <div class="user-details">
        <div class="user-name">${escH(u.nickname)}${userTagsHTML(u)}</div>
        <div class="user-stats"><span>✓ 有 <strong style="color:var(--green-light)">${u.have?.length||0}</strong></span><span>♥ 要 <strong style="color:#ff7070">${u.want?.length||0}</strong></span>${u.contact?`<span>📬 ${escH(u.contact)}</span>`:''}</div>
      </div>
      <div class="match-score"><div class="match-label">${ml}</div><div class="match-value">${u.score>0?u.score+' 項':'-'}</div></div>
    </div>`;
  }).join('');
  return`<div class="board-container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div><h3>📡 即時線上看板</h3><p style="font-size:12px;color:var(--text-dim)">自動顯示所有已登記玩家的交換需求</p></div>

    </div>
    <div class="user-list">${scored.length===0?'<div class="empty-state"><div class="icon">👥</div><h3>目前沒有其他玩家</h3></div>':rows}</div>
  </div>`;
}

function buildMessagesHTML(){
  const msgs=S.threadMessages;
  if(!msgs.length)return`<div style="text-align:center;color:var(--text-dim);padding:30px;font-size:13px">還沒有任何訊息，先打個招呼吧！</div>`;
  let html='';let lastDate='';
  msgs.forEach(m=>{
    const isMine=m.senderUid===S.user.uid;
    const dd=dateDivider(m.at);
    if(dd!==lastDate){html+=`<div class="chat-date-divider">${dd}</div>`;lastDate=dd;}
    const initials=escH((m.senderName||'?')[0]);
    html+=`<div class="chat-msg-wrap ${isMine?'mine':''}">
      <div class="chat-msg-avatar">${initials}</div>
      <div>
        <div class="chat-msg">${escH(m.text)}</div>
        <div class="chat-msg-time" style="${isMine?'text-align:right':''}">${fmtFull(m.at)}</div>
      </div>
    </div>`;
  });
  return html;
}

function buildTradeSidebarHTML(){
  const t=S.threads.find(t=>t.id===S.activeThread);if(!t)return'';
  const otherUid=t.participants.find(u=>u!==S.user.uid);
  const other=S.boardUsers.find(u=>u.uid===otherUid);
  if(!other)return`<div style="font-size:12px;color:var(--text-dim)">對方資料載入中…</div>`;
  const oH=new Set(other.have||[]),oW=new Set(other.want||[]);
  const iGive=[...oW].filter(id=>S.have.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  const theyGive=[...S.want].filter(id=>oH.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  return`<div style="font-size:12px;color:var(--gold);font-weight:bold;margin-bottom:8px">📊 交換摘要</div>
    <div class="trade-box"><h4>📤 我方提供（${iGive.length}張）</h4><div style="line-height:1.8">${iGive.length?iGive.map(id=>`<span class="tag-chip tag-have">${cardLabel(id)}</span>`).join(''):'<span style="color:var(--text-dim)">無</span>'}</div></div>
    <div class="trade-box"><h4>📥 對方提供（${theyGive.length}張）</h4><div style="line-height:1.8">${theyGive.length?theyGive.map(id=>`<span class="tag-chip tag-want">${cardLabel(id)}</span>`).join(''):'<span style="color:var(--text-dim)">無</span>'}</div></div>`;
}

function renderChatPanel(){
  const panel=document.getElementById('chatMainPanel');
  if(!panel||S.view!=='inbox')return;
  if(!S.activeThread){panel.innerHTML=`<div class="chat-no-select"><div style="font-size:40px">💬</div><div>選擇一個對話開始聊天</div></div>`;return;}
  const msgsEl=document.getElementById('chatMessages');
  if(msgsEl){
    const atBottom=msgsEl.scrollHeight-msgsEl.scrollTop-msgsEl.clientHeight<60;
    msgsEl.innerHTML=buildMessagesHTML();
    if(atBottom)scrollChatToBottom();
  }else{
    panel.innerHTML=buildChatPanelHTML();
    scrollChatToBottom();
  }
}

function scrollChatToBottom(){
  setTimeout(()=>{const el=document.getElementById('chatMessages');if(el)el.scrollTop=el.scrollHeight;},50);
}

// ==================== VIEW: ADMIN ====================
async function renderAdmin(){
  if(!S.user||!ADMIN_UIDS.has(S.user.uid)){
    return`<div class="empty-state"><div class="icon">🚫</div><h3>無管理員權限</h3><p style="font-size:12px;margin-top:8px">請確認你的 UID 已加入 ADMIN_UIDS</p></div>`;
  }
  // 讀取所有玩家
  const boardRef=collection(db,'artifacts',appId,'public','data','board');
  const boardSnap=await getDocs(boardRef);
  const users=boardSnap.docs.map(d=>d.data());
  // 讀取所有 thread
  const threadsRef=collection(db,'artifacts',appId,'public','data','threads');
  const threadsSnap=await getDocs(threadsRef);
  const threads=threadsSnap.docs.map(d=>({id:d.id,...d.data()}));

  const totalHave=users.reduce((s,u)=>s+(u.have?.length||0),0);
  const totalWant=users.reduce((s,u)=>s+(u.want?.length||0),0);

  const statsHTML=`<div class="stat-grid">
    <div class="stat-box"><div class="num">${users.length}</div><div class="lbl">註冊玩家</div></div>
    <div class="stat-box"><div class="num">${threads.length}</div><div class="lbl">對話紀錄</div></div>
    <div class="stat-box"><div class="num">${totalHave}</div><div class="lbl">總有牌數</div></div>
    <div class="stat-box"><div class="num">${totalWant}</div><div class="lbl">總求牌數</div></div>
  </div>`;

  const usersTableHTML=`<div class="admin-card admin-full">
    <div class="admin-card-header"><h3>👥 玩家列表</h3><span style="font-size:11px;color:var(--text-dim)">${users.length} 位</span></div>
    <div style="overflow-x:auto">
    <table class="admin-table">
      <thead><tr><th>暱稱</th><th>地點</th><th>聯絡</th><th>有牌</th><th>求牌</th><th>寄送/面交</th><th>更新時間</th><th>UID</th></tr></thead>
      <tbody>${users.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).map(u=>`<tr>
        <td><strong>${escH(u.nickname||'—')}</strong></td>
        <td>${escH(u.location||'—')}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${escH(u.contact||'—')}</td>
        <td><span class="badge badge-green">${u.have?.length||0}</span></td>
        <td><span class="badge badge-red">${u.want?.length||0}</span></td>
        <td>${u.canShip?'📦':''}${u.canMeet?'👋':''}&nbsp;</td>
        <td style="color:var(--text-dim)">${u.updatedAt?new Date(u.updatedAt).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'—'}</td>
        <td style="font-size:10px;color:var(--text-dim);font-family:monospace">${escH(u.uid||'').slice(0,12)}…</td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`;

  const threadsTableHTML=`<div class="admin-card admin-full">
    <div class="admin-card-header"><h3>💬 對話紀錄</h3><span style="font-size:11px;color:var(--text-dim)">${threads.length} 則</span></div>
    <div style="overflow-x:auto">
    <table class="admin-table">
      <thead><tr><th>對話雙方</th><th>最後訊息</th><th>最後時間</th></tr></thead>
      <tbody>${threads.sort((a,b)=>{const at=a.lastAt?.toMillis?a.lastAt.toMillis():0,bt=b.lastAt?.toMillis?b.lastAt.toMillis():0;return bt-at;}).map(t=>{
        const names=Object.values(t.names||{}).map(escH).join(' ↔ ');
        return`<tr>
          <td>${names||escH(t.id)}</td>
          <td style="color:var(--text-dim);max-width:200px;overflow:hidden;text-overflow:ellipsis">${escH(t.lastMsg||'（無訊息）')}</td>
          <td style="color:var(--text-dim)">${t.lastAt?fmtFull(t.lastAt):'—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;

  const cardsStatHTML=`<div class="admin-card">
    <div class="admin-card-header"><h3>🎴 卡片需求熱門榜（求牌）</h3></div>
    <div style="padding:12px">
      ${topCards(users,'want',10).map((c,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(42,42,74,0.4)">
        <span style="font-size:11px;color:var(--text-dim);width:18px">${i+1}</span>
        <span style="flex:1;font-size:12px">${cardLabel(c.id)}</span>
        <span class="badge badge-red">${c.count} 人</span>
      </div>`).join('')}
    </div>
  </div>`;

  const haveStatHTML=`<div class="admin-card">
    <div class="admin-card-header"><h3>🎴 卡片供應熱門榜（有牌）</h3></div>
    <div style="padding:12px">
      ${topCards(users,'have',10).map((c,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(42,42,74,0.4)">
        <span style="font-size:11px;color:var(--text-dim);width:18px">${i+1}</span>
        <span style="flex:1;font-size:12px">${cardLabel(c.id)}</span>
        <span class="badge badge-green">${c.count} 人</span>
      </div>`).join('')}
    </div>
  </div>`;

  return`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="color:var(--gold)">🛠 管理員後台</h2>
      <button class="btn-secondary" onclick="window.reloadAdmin()">🔄 重新整理</button>
    </div>
    ${statsHTML}
    <div class="admin-layout">${cardsStatHTML}${haveStatHTML}${usersTableHTML}${threadsTableHTML}</div>
  </div>`;
}

function topCards(users,field,n){
  const counter={};
  users.forEach(u=>(u[field]||[]).forEach(id=>{counter[id]=(counter[id]||0)+1;}));
  return Object.entries(counter).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([id,count])=>({id:Number(id),count}));
}

function updateStats(){

  if(items[2])items[2].innerHTML=`<div class="stat-dot" style="background:var(--red)"></div>我要 <strong style="color:#ff7070;margin-left:3px">${S.want.size}</strong>`;
}

    <div class="auth-tabs"><div class="auth-tab ${isLogin?'active':''}" onclick="window.toggleAuthMode('login')">登入</div><div class="auth-tab ${!isLogin?'active':''}" onclick="window.toggleAuthMode('register')">註冊</div></div>

        <div class="form-group" style="flex:1;margin-bottom:0"><label>接受面交👋</label><select id="authMeet"><option value="yes">可面交</option><option value="no">不面交</option></select></div>
      </div>`:''}
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:10px;text-align:center">⚠️ 忘記密碼將無法找回帳號，請牢記。</div>

window.doRegister=async()=>{
  const n=document.getElementById('authNick').value.trim(),p=document.getElementById('authPwd').value;
  const c=document.getElementById('authContact')?.value.trim()||'',loc=document.getElementById('authLocation')?.value||'未設定';
  const ship=document.getElementById('authShip')?.value==='yes',meet=document.getElementById('authMeet')?.value==='yes';
  if(!n||p.length<6)return window.toast('暱稱不能為空，密碼至少6位數');
  const safe=n.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g,'_');
  if(!safe)return window.toast('暱稱含太多特殊字元');
  document.getElementById('authBtn').innerText='創建中…';
  try{
    await createUserWithEmailAndPassword(auth,`${safe}@gi-trade.local`,p);
    S.nickname=n;S.contact=c;S.location=loc;S.canShip=ship;S.canMeet=meet;
    await saveToCloud();window.closeModal();window.toast('🎉 註冊成功！歡迎來到貪婪之島！');
  }catch(err){
    window.toast(err.code==='auth/email-already-in-use'?'此暱稱已被使用':'註冊失敗：'+err.message);
    document.getElementById('authBtn').innerText='創建角色';
  }
};
window.doLogin=async()=>{
  const n=document.getElementById('authNick').value.trim(),p=document.getElementById('authPwd').value;
  if(!n||!p)return window.toast('請輸入暱稱與密碼');
  const safe=n.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g,'_');
  document.getElementById('authBtn').innerText='登入中…';
  try{await signInWithEmailAndPassword(auth,`${safe}@gi-trade.local`,p);window.closeModal();window.toast('登入成功！');}
  catch(err){window.toast('帳號或密碼錯誤');document.getElementById('authBtn').innerText='進入遊戲';}
};

window.showUser=(u)=>{
  const uH=new Set(u.have||[]),uW=new Set(u.want||[]);
  const th=[...S.want].filter(id=>uH.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  const ih=[...uW].filter(id=>S.have.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  const hL=(u.have||[]).sort((a,b)=>getSortValue(a)-getSortValue(b)).map(id=>`<span class="tag-chip ${S.want.has(id)?'tag-have':'tag-normal'}">${cardLabel(id)}${S.want.has(id)?' ✓':''}</span>`).join('');
  const wL=(u.want||[]).sort((a,b)=>getSortValue(a)-getSortValue(b)).map(id=>`<span class="tag-chip ${S.have.has(id)?'tag-want':'tag-normal'}">${cardLabel(id)}${S.have.has(id)?' ✓':''}</span>`).join('');
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-header"><h2 style="color:var(--gold)">${escH(u.nickname)} ${userTagsHTML(u)}</h2><button class="modal-close" onclick="window.closeModal()">✕</button></div>
    ${u.contact?`<div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;padding:10px;background:var(--bg3);border-radius:8px">📬 ${escH(u.contact)}</div>`:''}
    ${(th.length||ih.length)?`<div style="background:rgba(201,168,76,0.08);border:1px solid var(--gold);border-radius:8px;padding:12px;margin-bottom:14px">
      <div style="font-size:13px;color:var(--gold);font-weight:bold;margin-bottom:8px">🔥 配對摘要</div>
      ${th.length?`<div style="font-size:12px;margin-bottom:4px;color:var(--green-light)">✓ 他有・你要：${th.map(cardLabel).join('、')}</div>`:''}
      ${ih.length?`<div style="font-size:12px;color:#ff7070">♥ 你有・他要：${ih.map(cardLabel).join('、')}</div>`:''}
    </div>`:''}
    <div style="margin-bottom:14px"><div style="font-size:12px;color:var(--green-light);font-weight:600;margin-bottom:8px">✓ 可提供（${u.have?.length||0}張）</div><div style="line-height:2">${hL||'<span style="color:var(--text-dim)">無</span>'}</div></div>
    <div><div style="font-size:12px;color:#ff7070;font-weight:600;margin-bottom:8px">♥ 希望取得（${u.want?.length||0}張）</div><div style="line-height:2">${wL||'<span style="color:var(--text-dim)">無</span>'}</div></div>
    <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:15px;display:flex;justify-content:flex-end">
      <button class="btn-primary" style="width:auto;padding:10px 24px" data-uid="${escH(u.uid)}" onclick="window.startChatWith(this.dataset.uid)">💬 發起交換私訊</button>
    </div>`;
  document.getElementById('modalOverlay').style.display='flex';
};

updateHeader();render();
