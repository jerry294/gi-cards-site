function getSortValue(id) { return id === -3 ? 100 : id; }
const CARDS_SORTED = [...CARDS].sort((a,b) => getSortValue(a.id) - getSortValue(b.id));

const GROUP_LABELS_RARITY = {
  SS:'✦ G.I 入手難度 SS', S:'★ G.I 入手難度 S', A:'◆ G.I 入手難度 A', B:'◇ G.I 入手難度 B',
  C:'○ G.I 入手難度 C', D:'· G.I 入手難度 D', FP:'🎴 自由口袋'
};
const GROUP_LABELS_ID = { DP:'📘 指定口袋 (No.000 - No.099)', FP:'🎴 自由口袋' };

function cardGroup(c, mode) { return mode==='id' ? ((c.id>=0&&c.id<=99)?'DP':'FP') : (FREE_POCKET_IDS.has(c.id)?'FP':c.rarity); }

// FIX #3: escH 定義為獨立函式，所有地方統一呼叫，不在 onclick 屬性內序列化物件
function escH(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
window.escH = escH;

// FIX #11: 未儲存旗標控制
function setUnsaved(val) {
  S.unsaved = val;
  const b = document.getElementById('unsavedBanner');
  if (b) b.style.display = val ? 'flex' : 'none';
}

function userTagsHTML(u) {
  let h = '';
  if (u.location && u.location!=='未設定') h += `<span class="user-name-tags">${escH(u.location)}</span>`;
  if (u.canShip) h += `<span class="user-name-tags" title="可寄送">📦</span>`;
  if (u.canMeet) h += `<span class="user-name-tags" title="可面交">👋</span>`;
  return h;
}

onAuthStateChanged(auth, (user) => {
  S.user = user;
  if (user) {
    const userRef = doc(db,'artifacts',appId,'public','data','board',user.uid);
    getDoc(userRef).then(snap => {
      if (snap.exists()) {
        const d = snap.data();
        S.nickname = d.nickname||''; S.contact = d.contact||''; S.location = d.location||'未設定';
        S.canShip = d.canShip||false; S.canMeet = d.canMeet||false;
        S.have = new Set(d.have||[]); S.want = new Set(d.want||[]);
      }
      updateHeader();
      setUnsaved(false);
      render();
    });
    listenToBoard();
  } else {
    S.nickname=''; S.location='未設定'; S.canShip=false; S.canMeet=false;
    S.have=new Set(); S.want=new Set();
    updateHeader(); render();
    setTimeout(window.openAuthModal, 500);
  }
});

// FIX #5: 登出時重置訂閱，重新登入後可重新建立監聽
let boardUnsubscribe = null;
function listenToBoard() {
  if (boardUnsubscribe) { boardUnsubscribe(); boardUnsubscribe = null; }
  const boardRef = collection(db,'artifacts',appId,'public','data','board');
  boardUnsubscribe = onSnapshot(boardRef, snap => {
    S.boardUsers = [];
    snap.forEach(d => { if (d.id !== S.user?.uid) S.boardUsers.push(d.data()); });
    if (S.view==='board' || S.view==='match') render();
  }, err => console.error("看板同步失敗", err));
}

async function saveToCloud() {
  if (!S.user) { window.toast('請先登入！'); window.openAuthModal(); return; }
  const userRef = doc(db,'artifacts',appId,'public','data','board',S.user.uid);
  try {
    await setDoc(userRef, {
      uid:S.user.uid, nickname:S.nickname, contact:S.contact,
      location:S.location||'未設定', canShip:!!S.canShip, canMeet:!!S.canMeet,
      have:Array.from(S.have), want:Array.from(S.want), updatedAt:Date.now()
    }, {merge:true});
    setUnsaved(false);
    window.toast('✅ 你的卡片進度已成功儲存至雲端！');
  } catch(e) { window.toast('儲存失敗，請重試。'); console.error(e); }
}

// ==================== CARD HELPERS ====================
function fmtId(id) { return id<0||id>=1000 ? `#${id}` : `#${String(id).padStart(3,'0')}`; }
function cardLabel(id) { const c=CARDS.find(c=>c.id===id); return c?`${fmtId(id)} ${c.name}`:`#${id}`; }
function rarityClass(r) { return r==='F'||r==='G'||r==='-'?'rarity-dsh':`rarity-${r}`; }

function cardHTML(card) {
  const h=S.have.has(card.id), w=S.want.has(card.id);
  let cls='card-item'; if(h) cls+=' have'; if(w) cls+=' want';
  const subBadge = SPELL_IDS.has(card.id) ? '<div class="sub-badge sub-spell">咒語</div>'
                 : VILLAGE_IDS.has(card.id) ? '<div class="sub-badge sub-village">村民</div>' : '';
  const storyCorner = STORY_IDS.has(card.id) ? '<div class="story-corner"></div>' : '';
  const rarityLabel = card.rarity==='-'?'─':card.rarity;
  return `<div class="${cls}" data-id="${card.id}">
    <div class="card-img-wrap">
      <img src="cards/${card.img}" alt="${card.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-no-img">🃏</div>
      <div class="card-rarity-badge ${rarityClass(card.rarity)}">${rarityLabel}</div>
      ${subBadge}${storyCorner}
      <div class="card-status-badges">
        ${h?'<div class="status-badge have-badge">有</div>':''}
        ${w?'<div class="status-badge want-badge">要</div>':''}
      </div>
    </div>
    <div class="card-info">
      <div class="card-num">${fmtId(card.id)}</div>
      <div class="card-name" title="${card.name}">${card.name}</div>
      <div class="card-actions">
        <button class="action-btn have-btn ${h?'active':''}" onclick="window.toggleHave(${card.id},event)">✓ 我有</button>
        <button class="action-btn want-btn ${w?'active':''}" onclick="window.toggleWant(${card.id},event)">♥ 我要</button>
      </div>
    </div>
  </div>`;
}

// FIX #8: 使用預排序的 CARDS_SORTED，不再每次重新 sort
function filteredCards() {
  const q = S.filter.search.toLowerCase();
  return CARDS_SORTED.filter(c => {
    if (q && !c.name.toLowerCase().includes(q) && !c.nameJP.toLowerCase().includes(q) && !String(c.id).includes(q)) return false;
    if (S.filter.rarity!=='all' && cardGroup(c,'rarity')!==S.filter.rarity) return false;
    if (S.filter.status==='have'    && !S.have.has(c.id)) return false;
    if (S.filter.status==='want'    && !S.want.has(c.id)) return false;
    if (S.filter.status==='neither' && (S.have.has(c.id)||S.want.has(c.id))) return false;
    if (S.filter.story && !STORY_IDS.has(c.id)) return false;
    return true;
  });
}

function renderCards() {
  if (!S.user) return `<div class="empty-state"><div class="icon">🔒</div><h3>請先登入</h3><p>登入後即可開始建立你的交換清單</p><button class="btn-primary" style="width:200px;margin-top:20px" onclick="window.openAuthModal()">立即登入</button></div>`;
  const list = filteredCards();
  const groups = {};
  list.forEach(c => { const g=cardGroup(c,S.filter.sortMode); if(!groups[g]) groups[g]=[]; groups[g].push(c); });
  const currentOrder  = S.filter.sortMode==='id' ? ['DP','FP'] : ['SS','S','A','B','C','D','FP'];
  const currentLabels = S.filter.sortMode==='id' ? GROUP_LABELS_ID : GROUP_LABELS_RARITY;
  let html = '';
  currentOrder.forEach(g => {
    if (!groups[g]||!groups[g].length) return;
    const col = S.collapsed[g];
    let gridHtml = '';
    if (g==='FP' && !col) {
      const spells=groups[g].filter(c=>SPELL_IDS.has(c.id)), village=groups[g].filter(c=>VILLAGE_IDS.has(c.id)), other=groups[g].filter(c=>!SPELL_IDS.has(c.id)&&!VILLAGE_IDS.has(c.id));
      if (spells.length)  gridHtml+=`<div style="font-size:11px;color:#a060e0;margin-bottom:6px;margin-top:4px;font-weight:600">⚡ 咒語（${spells.length}）</div><div class="card-grid" style="margin-bottom:14px">${spells.map(cardHTML).join('')}</div>`;
      if (village.length) gridHtml+=`<div style="font-size:11px;color:#ffc870;margin-bottom:6px;font-weight:600">🏘 村民（${village.length}）</div><div class="card-grid" style="margin-bottom:14px">${village.map(cardHTML).join('')}</div>`;
      if (other.length)   gridHtml+=`<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:600">其他（${other.length}）</div><div class="card-grid">${other.map(cardHTML).join('')}</div>`;
    } else if (!col) { gridHtml=`<div class="card-grid">${groups[g].map(cardHTML).join('')}</div>`; }
    html+=`<div class="section-group rg-${g}"><div class="section-group-header" onclick="window.toggleGroup('${g}')"><h3>${currentLabels[g]||g} <span class="cnt">(${groups[g].length})</span></h3><span class="tog">${col?'▶':'▼'}</span></div>${gridHtml}</div>`;
  });
  return `
    <div class="filter-bar">
      <div class="sort-group">
        <button class="filter-btn ${S.filter.sortMode==='id'?'active':''}" onclick="window.setFilter('sortMode','id')">🔢 按編號排列</button>
        <button class="filter-btn ${S.filter.sortMode==='rarity'?'active':''}" onclick="window.setFilter('sortMode','rarity')">⭐ 按入手難度排列</button>
      </div>
      <input type="text" placeholder="🔍 搜尋卡片名稱或編號…" value="${S.filter.search}" oninput="window.setFilter('search',this.value)">
      <button class="filter-btn ${S.filter.status==='all'?'active':''}" onclick="window.setFilter('status','all')">全部</button>
      <button class="filter-btn ${S.filter.status==='have'?'have-active':''}" onclick="window.setFilter('status','have')">✓ 我有的</button>
      <button class="filter-btn ${S.filter.status==='want'?'want-active':''}" onclick="window.setFilter('status','want')">♥ 我要的</button>
      <select class="filter-select" onchange="window.setFilter('rarity',this.value)"><option value="all">全部分類</option>${['SS','S','A','B','C','D','FP'].map(g=>`<option value="${g}" ${S.filter.rarity===g?'selected':''}>${GROUP_LABELS_RARITY[g]||g}</option>`).join('')}</select>
      <button class="btn-secondary" style="margin-left:auto;background:var(--gold);color:#000;font-weight:bold" onclick="window.manualSave()">☁️ 儲存至雲端</button>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-dot" style="background:#555"></div>共 ${CARDS.length} 張</div>
      <div class="stat-item"><div class="stat-dot" style="background:var(--green)"></div>我有 <strong style="color:var(--green-light);margin-left:3px">${S.have.size}</strong> 張</div>
      <div class="stat-item"><div class="stat-dot" style="background:var(--red)"></div>我要 <strong style="color:#ff7070;margin-left:3px">${S.want.size}</strong> 張</div>
      <div class="stat-item" style="margin-left:auto;color:var(--text-dim)">顯示 ${list.length} 張</div>
    </div>
    ${list.length===0?'<div class="empty-state"><div class="icon">🃏</div><h3>沒有符合條件的卡片</h3></div>':html}`;
}

function renderBoard() {
  if (!S.user) return `<div class="empty-state"><div class="icon">🔒</div><h3>請先登入</h3><p>登入後才能查看線上交換看板</p></div>`;
  const scored = S.boardUsers.map(u => {
    const uH=new Set(u.have||[]), uW=new Set(u.want||[]);
    const theyHaveIWant=[...S.want].filter(id=>uH.has(id)).length;
    const iHaveTheyWant=[...uW].filter(id=>S.have.has(id)).length;
    return {...u, theyHaveIWant, iHaveTheyWant, score:theyHaveIWant+iHaveTheyWant};
  }).sort((a,b)=>b.score-a.score);

  // FIX #3: 改用 data-uid 屬性，避免 JSON 序列化注入
  const userRows = scored.map(u => {
    const mCls=(u.theyHaveIWant>0&&u.iHaveTheyWant>0)?'match-perfect':(u.score>0)?'match-good':'';
    const mLabel=mCls==='match-perfect'?'🔥 雙向':mCls==='match-good'?'✨ 單向':'—';
    return `<div class="user-card ${mCls}" data-uid="${escH(u.uid)}" onclick="window.showUserByUid(this.dataset.uid)">
      <div class="user-avatar-lg">${escH((u.nickname||'?')[0])}</div>
      <div class="user-details">
        <div class="user-name">${escH(u.nickname)}${userTagsHTML(u)}</div>
        <div class="user-stats">
          <span>✓ 有 <strong style="color:var(--green-light)">${u.have?.length||0}</strong></span>
          <span>♥ 要 <strong style="color:#ff7070">${u.want?.length||0}</strong></span>
          ${u.contact?`<span>📬 ${escH(u.contact)}</span>`:''}
        </div>
      </div>
      <div class="match-score"><div class="match-label">${mLabel}</div><div class="match-value">${u.score>0?u.score+' 項':'-'}</div></div>
    </div>`;
  }).join('');

  return `<div class="board-container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div><h3>📡 即時線上看板</h3><p style="font-size:12px;color:var(--text-dim);">此看板會自動顯示目前所有註冊玩家的卡片需求。</p></div>
      <!-- FIX #1: 修正呼叫名稱為 openProfileEditModal -->
      <button class="btn-secondary" onclick="window.openProfileEditModal()">✏️ 編輯我的資料</button>
    </div>
    <div class="user-list">${scored.length===0?'<div class="empty-state"><div class="icon">👥</div><h3>看板目前沒有其他玩家</h3></div>':userRows}</div>
  </div>`;
}

function renderMatch() {
  if (!S.user) return `<div class="empty-state"><div class="icon">🔒</div><h3>請先登入</h3></div>`;
  const perfect = S.boardUsers.filter(u => {
    const uH=new Set(u.have||[]), uW=new Set(u.want||[]);
    return [...S.want].some(id=>uH.has(id)) && [...uW].some(id=>S.have.has(id));
  });
  if (!S.have.size&&!S.want.size) return `<div class="empty-state"><div class="icon">📋</div><h3>尚未設定卡片清單</h3></div>`;
  if (!perfect.length) return `<div class="empty-state"><div class="icon">🔍</div><h3>目前沒有雙向配對的玩家</h3></div>`;
  const cards = perfect.map(u => {
    const uH=new Set(u.have||[]), uW=new Set(u.want||[]);
    const theyHave=[...S.want].filter(id=>uH.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
    const iHave=[...uW].filter(id=>S.have.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
    return `<div class="match-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div class="user-avatar-lg">${escH((u.nickname||'?')[0])}</div>
        <div>
          <div style="font-weight:bold;font-size:15px;display:flex;align-items:center">${escH(u.nickname)}${userTagsHTML(u)}</div>
          <div style="font-size:12px;color:var(--text-dim)">${escH(u.contact)||'（未提供聯絡方式）'}</div>
        </div>
        <div style="margin-left:auto;text-align:center">
          <div style="font-size:10px;color:var(--text-dim)">配對強度</div><div style="font-size:22px;color:var(--gold);font-weight:bold">🔥${theyHave.length+iHave.length}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><div style="font-size:11px;color:var(--green-light);margin-bottom:6px;font-weight:600">✓ 他有・我想要（${theyHave.length}張）</div>${theyHave.map(id=>`<span class="tag-chip tag-have">${cardLabel(id)}</span>`).join('')}</div>
        <div><div style="font-size:11px;color:#ff7070;margin-bottom:6px;font-weight:600">♥ 我有・他想要（${iHave.length}張）</div>${iHave.map(id=>`<span class="tag-chip tag-want">${cardLabel(id)}</span>`).join('')}</div>
      </div>
      <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px;display:flex;justify-content:flex-end">
        <!-- FIX #3: data-uid 屬性取代 JSON 字串插入 -->
        <button class="btn-primary" style="width:auto;padding:8px 20px;font-size:13px;" data-uid="${escH(u.uid)}" onclick="window.startChat(this.dataset.uid)">💬 發起交換私訊</button>
      </div>
    </div>`;
  }).join('');
  return `<div style="max-width:800px"><div style="margin-bottom:14px;font-size:13px;color:var(--text-dim)">找到 <strong style="color:var(--gold)">${perfect.length}</strong> 個雙向配對</div>${cards}</div>`;
}

function renderChat() {
  if (!S.activeChatUser) return `<div class="empty-state">請先從交換看板選擇玩家。</div>`;
  const u=S.activeChatUser;
  const uH=new Set(u.have||[]), uW=new Set(u.want||[]);
  const iGiveThem=[...uW].filter(id=>S.have.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  const theyGiveMe=[...S.want].filter(id=>uH.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  const iGiveHtml=iGiveThem.length?iGiveThem.map(id=>`<span class="tag-chip tag-have">${cardLabel(id)}</span>`).join(''):'<span style="color:var(--text-dim);font-size:11px">無相符卡片</span>';
  const theyGiveHtml=theyGiveMe.length?theyGiveMe.map(id=>`<span class="tag-chip tag-want">${cardLabel(id)}</span>`).join(''):'<span style="color:var(--text-dim);font-size:11px">無相符卡片</span>';
  const msgs=S.chats[u.uid]||[];
  const msgHtml=msgs.length===0?'<div style="text-align:center;color:var(--text-dim);margin-top:20px;font-size:13px">還沒有任何訊息，試著當第一個發言的人吧！</div>':msgs.map(m=>`<div class="chat-msg ${m.sender==='me'?'mine':'theirs'}">${escH(m.text)}</div>`).join('');
  return `
    <div class="chat-container">
      <div class="chat-sidebar">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
          <div class="user-avatar-lg" style="width:36px;height:36px;font-size:14px">${escH((u.nickname||'?')[0])}</div>
          <div><div style="font-weight:bold;font-size:15px">${escH(u.nickname)}</div><div style="font-size:11px;color:var(--green-light)">● 線上</div></div>
        </div>
        <h3 style="font-size:13px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:5px">雙方交換清單</h3>
        <div class="trade-box"><h4>📤 我方提供 (他需要的)</h4><div style="line-height:1.6">${iGiveHtml}</div></div>
        <div class="trade-box"><h4>📥 對方提供 (我需要的)</h4><div style="line-height:1.6">${theyGiveHtml}</div></div>
        <button class="btn-secondary" style="margin-top:auto" onclick="window.switchView('board')">← 返回看板</button>
      </div>
      <div class="chat-main">
        <div class="chat-header">
          <div style="font-weight:bold;color:var(--gold);display:flex;align-items:center;">與 ${escH(u.nickname)} 的交換視窗 ${userTagsHTML(u)}</div>
          <div style="font-size:12px;color:var(--text-dim)">聯絡方式: ${escH(u.contact)||'未提供'}</div>
        </div>
        <div class="chat-messages" id="chatHistory">${msgHtml}</div>
        <div class="chat-input-area">
          <input type="text" id="chatInputMsg" placeholder="輸入訊息 (對話僅存在本機)..." onkeypress="if(event.key==='Enter') window.sendChatMessage()">
          <button onclick="window.sendChatMessage()">送出</button>
        </div>
      </div>
    </div>`;
}

window.switchView = (v) => {

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

window.toast = (msg) => {

  document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
};

function refreshCard(id) {
  const card=CARDS.find(c=>c.id===id); if(!card) return;
  const el=document.querySelector(`.card-item[data-id="${id}"]`); if(!el) return;
  const tmp=document.createElement('div'); tmp.innerHTML=cardHTML(card); el.replaceWith(tmp.firstElementChild);
}
function updateStats() {
  const bar=document.querySelector('.stats-bar'); if(!bar) return;
  const items=bar.querySelectorAll('.stat-item');
  if(items[1]) items[1].innerHTML=`<div class="stat-dot" style="background:var(--green)"></div>我有 <strong style="color:var(--green-light);margin-left:3px">${S.have.size}</strong> 張`;
  if(items[2]) items[2].innerHTML=`<div class="stat-dot" style="background:var(--red)"></div>我要 <strong style="color:#ff7070;margin-left:3px">${S.want.size}</strong> 張`;
}

        <div class="form-group" style="flex:1;margin-bottom:0;"><label>接受面交👋</label><select id="authMeet"><option value="yes">可面交</option><option value="no">不面交</option></select></div>
      </div>`:''}
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:10px;text-align:center;">⚠️ 提示：若忘記密碼將無法找回帳號，請務必牢記。</div>
    <button class="btn-primary" id="authBtn" onclick="${isLogin?'window.doLogin()':'window.doRegister()'}">${isLogin?'進入遊戲':'創建角色'}</button>`;
}

window.doRegister = async () => {
  const n=document.getElementById('authNick').value.trim();
  const p=document.getElementById('authPwd').value;
  const c=document.getElementById('authContact')?.value.trim()||'';
  const loc=document.getElementById('authLocation')?.value||'未設定';
  const ship=document.getElementById('authShip')?.value==='yes';
  const meet=document.getElementById('authMeet')?.value==='yes';
  if (!n||p.length<6) return window.toast('暱稱不能為空，且密碼需至少6位數');
  // FIX #4: 過濾暱稱特殊字元，確保 Firebase Auth email 格式有效
  const safeNick=n.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g,'_');
  if (!safeNick) return window.toast('暱稱含有太多特殊字元，請修改');
  document.getElementById('authBtn').innerText='創建中...';
  const fakeEmail=`${safeNick}@gi-trade.local`;
  try {
    await createUserWithEmailAndPassword(auth, fakeEmail, p);
    S.nickname=n; S.contact=c; S.location=loc; S.canShip=ship; S.canMeet=meet;
    await saveToCloud();
    window.closeModal(); window.toast('註冊成功！歡迎來到貪婪之島。');
  } catch(err) {
    if(err.code==='auth/email-already-in-use') window.toast('此暱稱已被使用，請換一個或直接登入。');
    else window.toast('註冊失敗：'+err.message);
    document.getElementById('authBtn').innerText='創建角色';
  }
};

window.doLogin = async () => {
  const n=document.getElementById('authNick').value.trim();
  const p=document.getElementById('authPwd').value;
  if (!n||!p) return window.toast('請輸入暱稱與密碼');
  // FIX #4: 登入時同樣套用 safeNick 轉換，與註冊時一致
  const safeNick=n.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g,'_');
  const fakeEmail=`${safeNick}@gi-trade.local`;
  document.getElementById('authBtn').innerText='登入中...';
  try {
    await signInWithEmailAndPassword(auth, fakeEmail, p);
    window.closeModal(); window.toast('登入成功！');
  } catch(err) {
    window.toast('帳號或密碼錯誤。');
    document.getElementById('authBtn').innerText='進入遊戲';
  }
};

  document.getElementById('modalContent').innerHTML=`
    <div class="modal-header"><h2 style="color:var(--gold)">👤 我的資料</h2><button class="modal-close" onclick="window.closeModal()">✕</button></div>
    <div class="form-group"><label>遊戲暱稱</label><input type="text" value="${escH(S.nickname)}" disabled style="opacity:0.6;cursor:not-allowed"></div>
    <div class="form-group"><label>聯絡方式</label><input type="text" id="editContact" value="${escH(S.contact)}"></div>
    <div class="form-group"><label>出沒地點</label><select id="editLocation"><option value="未設定">請選擇地點</option>${cityOptions}</select></div>
    <div style="display:flex;gap:10px;margin-bottom:16px;">
      <div class="form-group" style="flex:1;margin-bottom:0;"><label>接受寄送📦</label><select id="editShip"><option value="yes" ${S.canShip?'selected':''}>可寄送</option><option value="no" ${!S.canShip?'selected':''}>不寄送</option></select></div>
      <div class="form-group" style="flex:1;margin-bottom:0;"><label>接受面交👋</label><select id="editMeet"><option value="yes" ${S.canMeet?'selected':''}>可面交</option><option value="no" ${!S.canMeet?'selected':''}>不面交</option></select></div>
    </div>
    <button class="btn-primary" onclick="window.saveProfileEdit()">儲存變更</button>
    <div style="text-align:center;margin-top:20px;padding-top:15px;border-top:1px solid var(--border)">
      <button class="btn-secondary" style="border-color:var(--red);color:var(--red)" onclick="window.doLogout()">登出帳號</button>
    </div>`;
  document.getElementById('modalOverlay').style.display='flex';
};
// FIX #1: 保留舊名稱作為別名，防止任何地方仍呼叫 openProfileModal 時報錯
window.openProfileModal = window.openProfileEditModal;

window.saveProfileEdit = () => {
  S.contact=document.getElementById('editContact').value.trim();
  S.location=document.getElementById('editLocation').value;
  S.canShip=document.getElementById('editShip').value==='yes';
  S.canMeet=document.getElementById('editMeet').value==='yes';
  saveToCloud(); window.closeModal();
};

// FIX #5: 登出時一併重置 boardUnsubscribe，下次登入可重新監聽
window.doLogout = () => {
  if (boardUnsubscribe) { boardUnsubscribe(); boardUnsubscribe=null; }
  signOut(auth); window.closeModal(); window.toast('已登出。');
};

window.showUser = (u) => {
  const uH=new Set(u.have||[]), uW=new Set(u.want||[]);
  const theyHaveIWant=[...S.want].filter(id=>uH.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  const iHaveTheyWant=[...uW].filter(id=>S.have.has(id)).sort((a,b)=>getSortValue(a)-getSortValue(b));
  const haveList=(u.have||[]).sort((a,b)=>getSortValue(a)-getSortValue(b)).map(id=>`<span class="tag-chip ${S.want.has(id)?'tag-have':'tag-normal'}">${cardLabel(id)}${S.want.has(id)?' ✓':''}</span>`).join('');
  const wantList=(u.want||[]).sort((a,b)=>getSortValue(a)-getSortValue(b)).map(id=>`<span class="tag-chip ${S.have.has(id)?'tag-want':'tag-normal'}">${cardLabel(id)}${S.have.has(id)?' ✓':''}</span>`).join('');
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-header"><h2 style="color:var(--gold);display:flex;align-items:center;">${escH(u.nickname)} 的清單 ${userTagsHTML(u)}</h2><button class="modal-close" onclick="window.closeModal()">✕</button></div>
    ${u.contact?`<div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;padding:10px;background:var(--bg3);border-radius:8px">📬 ${escH(u.contact)}</div>`:''}
    ${(theyHaveIWant.length||iHaveTheyWant.length)?`<div style="background:rgba(201,168,76,0.08);border:1px solid var(--gold);border-radius:8px;padding:12px;margin-bottom:14px">
      <div style="font-size:13px;color:var(--gold);font-weight:bold;margin-bottom:8px">🔥 配對摘要</div>
      ${theyHaveIWant.length?`<div style="font-size:12px;margin-bottom:4px;color:var(--green-light)">✓ 他有・你要：${theyHaveIWant.map(cardLabel).join('、')}</div>`:''}
      ${iHaveTheyWant.length?`<div style="font-size:12px;color:#ff7070">♥ 你有・他要：${iHaveTheyWant.map(cardLabel).join('、')}</div>`:''}
    </div>`:''}
    <div style="margin-bottom:14px"><div style="font-size:12px;color:var(--green-light);font-weight:600;margin-bottom:8px">✓ 可提供交換（${u.have?.length||0}張）</div><div style="line-height:2">${haveList||'<span style="color:var(--text-dim);font-size:12px">無</span>'}</div></div>
    <div><div style="font-size:12px;color:#ff7070;font-weight:600;margin-bottom:8px">♥ 希望取得（${u.want?.length||0}張）</div><div style="line-height:2">${wantList||'<span style="color:var(--text-dim);font-size:12px">無</span>'}</div></div>
    <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:15px;display:flex;justify-content:flex-end">
      <!-- FIX #3: data-uid 屬性 -->
      <button class="btn-primary" style="width:auto;padding:10px 24px;" data-uid="${escH(u.uid)}" onclick="window.startChat(this.dataset.uid)">💬 發起交換私訊</button>
    </div>`;
  document.getElementById('modalOverlay').style.display='flex';
};

window.startChat = (uid) => {
  S.activeChatUser = S.boardUsers.find(u => u.uid === uid);
  if (!S.activeChatUser) return window.toast('找不到該玩家，請重新整理看板。');
  if (!S.chats[uid]) S.chats[uid]=[];
  window.closeModal();
  window.switchView('chat');
};

window.sendChatMessage = () => {
  const input=document.getElementById('chatInputMsg');
  const text=input?.value.trim();
  if (!text||!S.activeChatUser) return;
  const uid=S.activeChatUser.uid;
  S.chats[uid].push({sender:'me', text});
  input.value='';
  localStorage.setItem('gi_chats', JSON.stringify(S.chats));
  const hist=document.getElementById('chatHistory');
  hist.innerHTML+=`<div class="chat-msg mine">${escH(text)}</div>`;
  hist.scrollTop=9999;
};

// ==================== INIT ====================
updateHeader();
render();
</script>
</body>
</html>
